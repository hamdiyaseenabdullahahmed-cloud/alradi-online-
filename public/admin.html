<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لوحة المدير — الرعدي بلاس</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .admin-wrap { display:flex; gap:20px; }
    .sidebar { width:220px; background:#0b1220; color:#fff; padding:20px; border-radius:12px; }
    .sidebar h3 { margin-bottom:20px; color:#ffb703; }
    .sidebar a { display:block; margin-bottom:12px; color:#fff; text-decoration:none; }
    .sidebar a:hover { color:#ffb703; }
    .content { flex:1; background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .stats { display:flex; gap:20px; margin-bottom:20px; }
    .stat { flex:1; background:#f1f5f9; padding:20px; border-radius:12px; text-align:center; }
    .stat h4 { margin-bottom:8px; color:#0b1220; }
    .products-admin { display:flex; flex-direction:column; gap:12px; }
    .products-admin div { padding:12px; border:1px solid #e5e7eb; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
    .products-admin button { margin-left:8px; }
    .login-box { max-width:400px; margin:40px auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .login-box input { width:100%; padding:10px; margin-bottom:12px; border:1px solid #e5e7eb; border-radius:8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="brand">
      <img src="/assets/logo.png" alt="logo" class="logo-img" />
      <div>
        <h1>الرعدي بلاس</h1>
        <p class="tag">لوحة المدير</p>
      </div>
    </div>
    <div class="header-actions">
      <button onclick="location.href='/'" class="btn secondary">الرئيسية</button>
    </div>
  </header>

  <!-- Login Section -->
  <div id="loginSection" class="login-box">
    <h3>تسجيل دخول المدير</h3>
    <input type="text" id="adminUser" placeholder="اسم المستخدم" />
    <input type="password" id="adminPass" placeholder="كلمة المرور" />
    <button class="btn primary" onclick="adminLogin()">دخول</button>
  </div>

  <!-- Admin Panel -->
  <main id="adminPanel" class="container" style="display:none">
    <div class="admin-wrap">
      <!-- Sidebar -->
      <div class="sidebar">
        <h3>القائمة</h3>
        <a href="#stats">الإحصائيات</a>
        <a href="#products">المنتجات</a>
        <a href="#addProduct">إضافة منتج</a>
        <a href="#orders">الطلبات</a>
      </div>

      <!-- Content -->
      <div class="content">
        <!-- Stats -->
        <section id="stats" class="section">
          <h3>الإحصائيات</h3>
          <div class="stats">
            <div class="stat"><h4>عدد المنتجات</h4><div id="statProducts">0</div></div>
            <div class="stat"><h4>عدد الطلبات</h4><div id="statOrders">0</div></div>
            <div class="stat"><h4>الإيرادات</h4><div id="statRevenue">0 ر.س</div></div>
          </div>
        </section>

        <!-- Products -->
        <section id="products" class="section">
          <h3>إدارة المنتجات</h3>
          <div id="adminProducts" class="products-admin"></div>
        </section>

        <!-- Add Product -->
        <section id="addProduct" class="section">
          <h3>إضافة منتج جديد</h3>
          <form id="addProductForm">
            <input type="text" name="name" placeholder="اسم المنتج" required />
            <input type="number" name="price" placeholder="السعر" required />
            <input type="number" name="old_price" placeholder="السعر القديم" />
            <input type="text" name="category" placeholder="الفئة" />
            <textarea name="description" placeholder="الوصف"></textarea>
            <input type="file" name="image" />
            <button type="submit" class="btn primary">إضافة</button>
          </form>
        </section>

        <!-- Orders -->
        <section id="orders" class="section">
          <h3>الطلبات</h3>
          <div id="adminOrders"></div>
        </section>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">© 2026 الرعدي أونلاين - جميع الحقوق محفوظة</footer>

  <!-- Script -->
  <script>
    let token = '';

    async function adminLogin(){
      const u = document.getElementById('adminUser').value;
      const p = document.getElementById('adminPass').value;
      try{
        const res = await fetch('/api/auth/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({username:u,password:p})
        });
        const data = await res.json();
        if(data.token){
          token = data.token;
          localStorage.setItem('token', token);
          document.getElementById('loginSection').style.display='none';
          document.getElementById('adminPanel').style.display='block';
          loadStats();
          loadProducts();
          loadOrders();
        }else{
          alert('فشل تسجيل الدخول');
        }
      }catch(e){
        console.error(e);
        alert('خطأ في الاتصال');
      }
    }

    async function loadStats(){
      try{
        const res = await fetch('/api/admin/stats',{headers:{Authorization:'Bearer '+token}});
        const data = await res.json();
        document.getElementById('statProducts').textContent = data.products;
        document.getElementById('statOrders').textContent = data.orders;
        document.getElementById('statRevenue').textContent = data.revenue+' ر.س';
      }catch(e){ console.error(e); }
    }

    async function loadProducts(){
      try{
        const res = await fetch('/api/products');
        const data = await res.json();
        const div = document.getElementById('adminProducts');
        div.innerHTML='';
        data.forEach(p=>{
          const el = document.createElement('div');
          el.innerHTML = `
            <span>${p.name} — ${p.price} ر.س</span>
            <div>
              <button class="btn secondary" onclick="editProduct(${p.id})">تعديل</button>
              <button class="btn primary" onclick="deleteProduct(${p.id})">حذف</button>
            </div>
          `;
          div.appendChild(el);
        });
      }catch(e){ console.error(e); }
    }

    async function deleteProduct(id){
      if(!confirm('هل تريد حذف المنتج؟')) return;
      try{
        const res = await fetch('/api/admin/products/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+token}});
        const data = await res.json();
        if(data.ok){ alert('تم الحذف'); loadProducts(); }
        else alert('فشل الحذف');
      }catch(e){ console.error(e); }
    }

    function editProduct(id){
      alert('واجهة تعديل المنتج رقم '+id+' (يمكن تطويرها لاحقًا)');
    }

    document.getElementById('addProductForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const formData = new FormData(e.target);
      try{
        const res = await fetch('/api/admin/products',{
          method:'POST',
          headers:{Authorization:'Bearer '+token},
          body: formData
        });
        const data = await res.json();
        if(data.ok){ alert('تمت إضافة المنتج'); loadProducts(); }
        else alert('فشل الإضافة');
      }catch(e){ console.error(e); }
    }
                                                               async function loadOrders(){
      try{
        const res = await fetch('/api/orders',{headers:{Authorization:'Bearer '+token}});
        const data = await res.json();
        const div = document.getElementById('adminOrders');
        div.innerHTML='';
        if(!data.length){
          div.innerHTML='<p>لا توجد طلبات حالياً</p>';
          return;
        }
        data.forEach(o=>{
          const el = document.createElement('div');
          el.style.padding='10px';
          el.style.border='1px solid #e5e7eb';
          el.style.borderRadius='8px';
          el.style.marginBottom='8px';
          el.innerHTML = `
            <span>طلب رقم ${o.id} — الحالة: ${o.status} — المجموع: ${o.total} ر.س</span>
            <button class="btn secondary" onclick="viewInvoice(${o.id})">عرض الفاتورة</button>
          `;
          div.appendChild(el);
        });
      }catch(e){ 
        console.error(e); 
        alert('خطأ في تحميل الطلبات'); 
      }
    }

    function viewInvoice(id){
      window.open('/api/invoice/'+id,'_blank');
    }
  </script>
</body>
</html>
