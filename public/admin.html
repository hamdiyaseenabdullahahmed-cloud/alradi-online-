<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة تحكم الرعدي أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #1A1A2E;
            --bg-dark: #0A0A15;
            --bg-card: #1A1A2E;
            --text-light: #FFFFFF;
            --text-muted: #A0A0B0;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --border: #2A2A3E;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            min-height: 100vh;
        }

        /* الشريط الجانبي */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            top: 0;
            right: 0;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-header h2 {
            color: var(--primary);
            font-size: 24px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 25px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 600;
        }

        .nav-item:hover {
            background: rgba(201,168,76,0.1);
            color: var(--primary);
        }

        .nav-item.active {
            background: rgba(201,168,76,0.15);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }

        .nav-item .icon {
            font-size: 20px;
            width: 28px;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            flex: 1;
            padding: 30px;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title .icon {
            font-size: 32px;
        }

        .top-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* البطاقات الإحصائية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        .stat-icon {
            font-size: 28px;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .change-up { color: var(--success); }
        .change-down { color: var(--danger); }

        /* الجداول */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            margin-bottom: 25px;
        }

        .table-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .table-title {
            font-size: 18px;
            font-weight: bold;
        }

        .table-search input {
            padding: 8px 15px;
            border-radius: 50px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            width: 250px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .data-table th {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--primary);
        }

        .data-table td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .data-table tr:hover {
            background: rgba(201,168,76,0.05);
        }

        /* الأزرار */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            font-size: 13px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--secondary);
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: var(--secondary);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--secondary);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .btn-xs {
            padding: 4px 10px;
            font-size: 11px;
        }

        /* النماذج */
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: none;
        }

        .form-card.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-light);
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        /* البادجات */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-pending { background: var(--warning); color: var(--secondary); }
        .badge-confirmed { background: var(--info); color: white; }
        .badge-processing { background: #9B59B6; color: white; }
        .badge-shipped { background: var(--success); color: white; }
        .badge-delivered { background: #27AE60; color: white; }
        .badge-cancelled { background: var(--danger); color: white; }

        /* الرسم البياني */
        .chart-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .chart-card h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        /* المودالات */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* زر القائمة للجوال */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 200;
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* التبديل */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--success);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        /* الإشعارات */
        .admin-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* استجابة للجوال */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: fixed;
                width: 260px;
                z-index: 150;
            }
            .sidebar.open {
                display: block;
            }
            .main-content {
                margin-right: 0;
                padding: 20px;
                padding-top: 70px;
            }
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .table-search input {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>

<!-- الشريط الجانبي -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>🦅 الرعدي أونلاين</h2>
        <p>لوحة التحكم الإمبراطورية</p>
    </div>
    <div class="sidebar-nav">
        <div class="nav-item active" data-tab="dashboard">
            <span class="icon">📊</span>
            <span>لوحة القيادة</span>
        </div>
        <div class="nav-item" data-tab="products">
            <span class="icon">📦</span>
            <span>المنتجات</span>
            <span class="nav-badge" id="lowStockBadge" style="display: none;">0</span>
        </div>
        <div class="nav-item" data-tab="orders">
            <span class="icon">📋</span>
            <span>الطلبات</span>
            <span class="nav-badge" id="pendingOrdersBadge" style="display: none;">0</span>
        </div>
        <div class="nav-item" data-tab="customers">
            <span class="icon">👥</span>
            <span>العملاء</span>
        </div>
        <div class="nav-item" data-tab="coupons">
            <span class="icon">🎫</span>
            <span>الكوبونات</span>
        </div>
        <div class="nav-item" data-tab="categories">
            <span class="icon">📂</span>
            <span>الأقسام</span>
        </div>
        <div class="nav-item" data-tab="banners">
            <span class="icon">🖼️</span>
            <span>البانرات</span>
        </div>
        <div class="nav-item" data-tab="settings">
            <span class="icon">⚙️</span>
            <span>الإعدادات</span>
        </div>
        <div class="nav-item" data-tab="reports">
            <span class="icon">📈</span>
            <span>التقارير</span>
        </div>
        <div class="nav-item" data-tab="trash">
            <span class="icon">🗑️</span>
            <span>سلة المحذوفات</span>
        </div>
    </div>
    <div style="padding: 20px; border-top: 1px solid var(--border); margin-top: auto;">
        <div class="nav-item" onclick="window.location.href='/'">
            <span class="icon">🏠</span>
            <span>زيارة المتجر</span>
        </div>
        <div class="nav-item" onclick="logout()">
            <span class="icon">🚪</span>
            <span>تسجيل خروج</span>
        </div>
    </div>
</aside>

<!-- المحتوى الرئيسي -->
<main class="main-content" id="mainContent">
    <div class="top-bar">
        <div class="page-title">
            <span class="icon">📊</span>
            <span id="pageTitle">لوحة القيادة</span>
        </div>
        <div class="top-actions">
            <button class="btn btn-outline btn-sm" onclick="refreshCurrentTab()">🔄 تحديث</button>
            <button class="btn btn-primary btn-sm" id="addBtn" onclick="showAddForm()" style="display: none;">➕ إضافة جديد</button>
        </div>
    </div>
    <div id="tabContent"></div>
</main>

<script>
    // ==================== المتغيرات العامة ====================
    const API = '/api';
    let adminToken = localStorage.getItem('adminToken');
    let currentTab = 'dashboard';
    let editingId = null;

    // ==================== المصادقة ====================
    async function initAuth() {
        if (!adminToken) {
            const password = prompt('🔐 أدخل كلمة مرور المدير:');
            if (password) {
                try {
                    const res = await fetch(`${API}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier: 'alradi@gmail.com', password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        adminToken = data.token;
                        localStorage.setItem('adminToken', adminToken);
                        loadTab('dashboard');
                    } else {
                        alert('❌ كلمة المرور غير صحيحة');
                        window.location.href = '/';
                    }
                } catch (e) {
                    alert('❌ فشل الاتصال بالخادم');
                    window.location.href = '/';
                }
            } else {
                window.location.href = '/';
            }
        } else {
            loadTab('dashboard');
        }
    }

    function logout() {
        if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
            localStorage.removeItem('adminToken');
            window.location.href = '/';
        }
    }

    // ==================== التنقل بين التبويبات ====================
    function toggleMobileMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const tab = item.dataset.tab;
            if (tab) {
                loadTab(tab);
            }
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    });

    function refreshCurrentTab() {
        loadTab(currentTab);
    }

    async function loadTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.tab === tab) {
                item.classList.add('active');
            }
        });

        const titleMap = {
            dashboard: 'لوحة القيادة',
            products: 'إدارة المنتجات',
            orders: 'إدارة الطلبات',
            customers: 'إدارة العملاء',
            coupons: 'إدارة الكوبونات',
            categories: 'إدارة الأقسام',
            banners: 'إدارة البانرات',
            settings: 'إعدادات المتجر',
            reports: 'التقارير والإحصائيات',
            trash: 'سلة المحذوفات'
        };
        document.getElementById('pageTitle').innerHTML = `<span class="icon">${getIconForTab(tab)}</span> ${titleMap[tab] || tab}`;
        
        const addBtn = document.getElementById('addBtn');
        if (tab === 'products' || tab === 'coupons' || tab === 'categories' || tab === 'banners') {
            addBtn.style.display = 'inline-flex';
        } else {
            addBtn.style.display = 'none';
        }

        switch (tab) {
            case 'dashboard': await loadDashboard(); break;
            case 'products': await loadProducts(); break;
            case 'orders': await loadOrders(); break;
            case 'customers': await loadCustomers(); break;
            case 'coupons': await loadCoupons(); break;
            case 'categories': await loadCategories(); break;
            case 'banners': await loadBanners(); break;
            case 'settings': await loadSettings(); break;
            case 'reports': await loadReports(); break;
            case 'trash': await loadTrash(); break;
        }
    }

    function getIconForTab(tab) {
        const icons = {
            dashboard: '📊',
            products: '📦',
            orders: '📋',
            customers: '👥',
            coupons: '🎫',
            categories: '📂',
            banners: '🖼️',
            settings: '⚙️',
            reports: '📈',
            trash: '🗑️'
        };
        return icons[tab] || '📊';
    }

    function showAddForm() {
        if (currentTab === 'products') {
            showProductForm();
        } else if (currentTab === 'coupons') {
            showCouponForm();
        } else if (currentTab === 'categories') {
            showCategoryForm();
        } else if (currentTab === 'banners') {
            showBannerForm();
        }
    }

    function showToast(message, type = 'success') {
        const existingToast = document.querySelector('.admin-toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'admin-toast';
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: ${type === 'success' ? '#2ECC71' : type === 'error' ? '#E74C3C' : '#C9A84C'};
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 10000;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ==================== لوحة القيادة ====================
    async function loadDashboard() {
        const container = document.getElementById('tabContent');
        container.innerHTML = `
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-header"><span class="stat-label">جاري التحميل...</span></div></div>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
                <div class="table-container">
                    <div class="table-header"><span class="table-title">📋 آخر الطلبات</span></div>
                    <table class="data-table"><thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody id="recentOrdersBody"></tbody></table>
                </div>
                <div class="chart-card">
                    <h3>📈 المبيعات الشهرية</h3>
                    <canvas id="salesChart" width="400" height="250"></canvas>
                </div>
            </div>
            <div class="table-container">
                <div class="table-header"><span class="table-title">⚠️ منتجات أوشكت على النفاد</span></div>
                <table class="data-table"><thead><tr><th>المنتج</th><th>المخزون</th><th>الحالة</th></tr></thead><tbody id="lowStockBody"></tbody></table>
            </div>
        `;
        
        try {
            const res = await fetch(`${API}/admin/stats`, {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            
            if (data.success) {
                const stats = data.data;
                document.getElementById('statsGrid').innerHTML = `

    function drawChart(orders) {
        const canvas = document.getElementById('salesChart');
        if (!canvas || !orders.length) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const values = orders.map(o => o.pricing?.total || 0);
        const maxVal = Math.max(...values, 1);
        
        ctx.beginPath();
        ctx.strokeStyle = '#C9A84C';
        ctx.lineWidth = 3;
        ctx.fillStyle = 'rgba(201,168,76,0.1)';
        
        const step = canvas.width / (values.length - 1 || 1);
        const points = values.map((v, i) => ({
            x: i * step,
            y: canvas.height - (v / maxVal) * (canvas.height - 60) - 30
        }));
        
        ctx.moveTo(points[0].x, points[0].y);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length - 1].x, canvas.height);
        ctx.lineTo(points[0].x, canvas.height);
        ctx.fill();
        ctx.stroke();
        
        points.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#C9A84C';
            ctx.fill();
        });
    }

    async function saveProduct() {
        const name = document.getElementById('productName').value.trim();
        const category = document.getElementById('productCategory').value;
        const price = parseFloat(document.getElementById('productPrice').value);
        const comparePrice = parseFloat(document.getElementById('productComparePrice').value) || null;
        const stock = parseInt(document.getElementById('productStock').value);
        const image = document.getElementById('productImage').value.trim();
        const description = document.getElementById('productDescription').value.trim();
        const tags = document.getElementById('productTags').value.split(',').map(t => t.trim()).filter(Boolean);
        const isFeatured = document.getElementById('productFeatured').value === 'true';
        
        if (!name || !category || isNaN(price)) {
            showToast('يرجى ملء الحقول المطلوبة', 'error');
            return;
        }
        
        const body = { name, category, price, comparePrice, stock, description, tags, isFeatured };
        if (image) body.images = [{ url: image, type: 'main' }];
        
        const url = editingId ? `${API}/products/${editingId}` : `${API}/products`;
        const method = editingId ? 'PUT' : 'POST';
        
        try {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.success) {
                showToast('تم حفظ المنتج بنجاح', 'success');
                hideProductForm();
                fetchProducts();
            } else {
                showToast(data.error || 'فشل حفظ المنتج', 'error');
            }
        } catch (error) {
            showToast('فشل الاتصال بالخادم', 'error');
        }
    }

                body: JSON.stringify(data)
            });
            showToast('تم حفظ إعدادات الضريبة', 'success');
        } catch (error) {
            showToast('فشل حفظ الإعدادات', 'error');
        }
    }

    // ==================== التقارير ====================
    async function loadReports() {
        const container = document.getElementById('tabContent');
        container.innerHTML = `
            <div class="chart-card">
                <h3>📊 تقرير المبيعات</h3>
                <canvas id="reportsChart" width="800" height="300"></canvas>
            </div>
            <div class="table-container">
                <div class="table-header"><span class="table-title">أفضل المنتجات مبيعاً</span></div>
                <table class="data-table"><thead><tr><th>#</th><th>المنتج</th><th>عدد المبيعات</th><th>الإيرادات</th></tr></thead><tbody id="topProductsBody"></tbody></table>
            </div>
        `;
        await fetchReports();
    }

    async function fetchReports() {
        try {
            const res = await fetch(`${API}/admin/stats`, {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                const topProducts = data.data.bestSellingProducts || [];
                document.getElementById('topProductsBody').innerHTML = topProducts.map((p, i) => `
                    <tr>
                        <td>${i + 1}<\/td>
                        <td><strong>${p.name}</strong><\/td>
                        <td>${p.salesCount || 0}<\/td>
                        <td style="color: var(--primary);">${((p.salesCount || 0) * p.price).toLocaleString()} ر.س<\/td>
                    <\/tr>
                `).join('');
                
                const canvas = document.getElementById('reportsChart');
                if (canvas && topProducts.length) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const values = topProducts.slice(0, 6).map(p => p.salesCount || 0);
                    const maxVal = Math.max(...values, 1);
                    const barWidth = (canvas.width - 100) / values.length - 10;
                    
                    values.forEach((v, i) => {
                        const x = 60 + i * (barWidth + 10);
                        const barH = (v / maxVal) * (canvas.height - 80);
                        const y = canvas.height - barH - 40;
                        ctx.fillStyle = '#C9A84C';
                        ctx.fillRect(x, y, barWidth, barH);
                        ctx.fillStyle = '#A0A0B0';
                        ctx.font = '10px Cairo';
                        ctx.fillText(topProducts[i]?.name?.substring(0, 10) || '', x + 5, canvas.height - 20);
                        ctx.fillStyle = '#C9A84C';
                        ctx.fillText(v.toString(), x + barWidth / 2 - 10, y - 5);
                    });
                }
            }
        } catch (error) {
            console.error('خطأ في تحميل التقارير:', error);
        }
    }

    // ==================== سلة المحذوفات ====================
    async function loadTrash() {
        const container = document.getElementById('tabContent');
        container.innerHTML = `
            <div class="stats-grid" id="trashStats"></div>
            <div class="table-container">
                <div class="table-header">
                    <span class="table-title">🗑️ سلة المحذوفات</span>
                    <button class="btn btn-danger btn-sm" onclick="emptyTrash()">🗑️ تفريغ السلة</button>
                </div>
                <table class="data-table">
                    <thead><tr><th>العنصر</th><th>النوع</th><th>السعر</th><th>تاريخ الحذف</th><th>إجراءات</th></tr></thead>
                    <tbody id="trashTableBody"><tr><td colspan="5" style="text-align: center;">جاري التحميل...<\/td><\/tr><\/tbody>
                <\/table>
            <\/div>
        `;
        await fetchTrash();
    }

    async function fetchTrash() {
        try {
            const res = await fetch(`${API}/trash`, {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                const items = data.data;
                document.getElementById('trashStats').innerHTML = `
                    <div class="stat-card"><div class="stat-header"><span class="stat-label">🗑️ إجمالي العناصر</span></div><div class="stat-value">${items.length}</div></div>
                    <div class="stat-card"><div class="stat-header"><span class="stat-label">📦 منتجات</span></div><div class="stat-value">${items.filter(i => i.originalCollection === 'products').length}</div></div>
                `;
                
                document.getElementById('trashTableBody').innerHTML = items.map(item => `
                    <tr>
                        <td><strong>${item.name || item._id}<\/strong><\/td>
                        <td>${item.originalCollection === 'products' ? '📦 منتج' : '📋 آخر'}<\/td>
                        <td>${item.price ? item.price + ' ر.س' : '—'}<\/td>
                        <td>${item.deletedAt ? new Date(item.deletedAt).toLocaleDateString('ar-SA') : '—'}<\/td>
                        <td>
                            <button class="btn btn-success btn-xs" onclick="restoreFromTrash('${item._id}')">↩️ استعادة</button>
                            <button class="btn btn-danger btn-xs" onclick="deleteFromTrash('${item._id}')">💀 حذف نهائي</button>
                        <\/td>
                    <\/tr>
                `).join('');
            }
        } catch (error) {
            console.error('خطأ في جلب سلة المحذوفات:', error);
        }
    }

    async function restoreFromTrash(id) {
        try {
            const res = await fetch(`${API}/trash/restore/${id}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('تمت الاستعادة بنجاح', 'success');
                fetchTrash();
                if (currentTab === 'products') fetchProducts();
            } else {
                showToast(data.error || 'فشل الاستعادة', 'error');
            }
        } catch (error) {
            showToast('فشل الاتصال بالخادم', 'error');
        }
    }

    async function deleteFromTrash(id) {
        if (!confirm('⚠️ هل أنت متأكد؟ هذا الإجراء لا يمكن التراجع عنه!')) return;
        try {
            const res = await fetch(`${API}/trash/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('تم الحذف النهائي', 'success');
                fetchTrash();
            } else {
                showToast(data.error || 'فشل الحذف', 'error');
            }
        } catch (error) {
            showToast('فشل الاتصال بالخادم', 'error');
        }
    }

    async function emptyTrash() {
        if (!confirm('⚠️ تحذير: سيتم حذف جميع العناصر نهائياً! هل أنت متأكد؟')) return;
        const items = document.querySelectorAll('#trashTableBody tr');
        for (const row of items) {
            const deleteBtn = row.querySelector('.btn-danger');
            if (deleteBtn) {
                const onclick = deleteBtn.getAttribute('onclick');
                const id = onclick.match(/'([^']+)'/)?.[1];
                if (id) await deleteFromTrash(id);
            }
        }
        showToast('تم تفريغ سلة المحذوفات', 'success');
        fetchTrash();
    }

    // ==================== بدء التشغيل ====================
    initAuth();
</script>
</body>
