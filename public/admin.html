<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 لوحة التحكم – الرعدي أونلاين</title>
    <meta name="theme-color" content="#C9A84C">
    <style>
        :root {
            --primary: #C9A84C;
            --primary-dark: #A68A3E;
            --primary-light: #E6C975;
            --secondary: #1A1A2E;
            --bg: #0A0A15;
            --card: #1A1A2E;
            --card-hover: #222240;
            --text: #FFFFFF;
            --muted: #A0A0B0;
            --border: #2A2A3E;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* الشريط الجانبي */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 20px 15px;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .sidebar-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo .icon { font-size: 32px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .nav-section { margin-bottom: 15px; }
        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 15px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin-bottom: 3px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--muted);
            font-size: 14px;
            border: none;
            background: none;
            width: 100%;
            text-align: right;
            position: relative;
        }
        .nav-item:hover { background: rgba(201,168,76,0.08); color: var(--text); }
        .nav-item.active {
            background: rgba(201,168,76,0.15);
            color: var(--primary);
            font-weight: bold;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 3px;
        }
        .nav-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .nav-badge {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            flex: 1;
            padding: 30px;
            transition: var(--transition);
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .page-title { font-size: 28px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .page-title .icon { font-size: 32px; }
        .page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        /* البطاقات الإحصائية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: var(--primary);
            opacity: 0.05;
            border-radius: 50%;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .stat-label { color: var(--muted); font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-icon { font-size: 28px; opacity: 0.7; }
        .stat-value { font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
        .stat-footer { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .stat-trend-up { color: var(--success); }
        .stat-trend-down { color: var(--danger); }

        /* الجداول */
        .table-container {
            overflow-x: auto;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .table-title { font-size: 18px; font-weight: bold; }
        .table-search input {
            padding: 10px 15px;
            border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            width: 250px;
            font-family: inherit;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .data-table th {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(201,168,76,0.05);
            color: var(--primary);
            white-space: nowrap;
        }
        .data-table td {
            padding: 14px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }
        .data-table tr:hover { background: rgba(201,168,76,0.03); }
        .product-img {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: #0A0A15;
        }

        /* الأزرار */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: var(--secondary); }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: var(--secondary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--secondary); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 50%; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

        /* الفورم */
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: none;
        }
        .form-card.active { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } }
        .form-card h3 { font-size: 20px; color: var(--primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

        /* البادجات */
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-pending { background: rgba(243,156,18,0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(52,152,219,0.2); color: var(--info); }
        .badge-processing { background: rgba(155,89,182,0.2); color: #9B59B6; }
        .badge-shipped { background: rgba(46,204,113,0.2); color: var(--success); }
        .badge-delivered { background: rgba(39,174,96,0.2); color: #27AE60; }
        .badge-cancelled { background: rgba(231,76,60,0.2); color: var(--danger); }

        /* الألسنة */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } }

        /* الرسم البياني */
        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
        }
        .chart-card h3 { margin-bottom: 20px; color: var(--primary); }

        /* زر القائمة للجوال */
        #mobileMenuToggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 600;
            background: var(--primary);
            color: var(--secondary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
        }
        #mobileMenuToggle:hover { background: var(--primary-light); transform: scale(1.1); }

        /* Responsive */
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); } }
        @media (max-width: 992px) { .sidebar { width: 240px; } .main-content { margin-right: 240px; } }
        @media (max-width: 768px) {
            #mobileMenuToggle { display: block; }
            .sidebar {
                display: none;
                width: 280px;
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                z-index: 500;
                height: 100%;
                max-height: 100vh;
                flex-direction: column;
                overflow-y: auto;
                box-shadow: var(--shadow-lg);
            }
            .sidebar.open { display: flex; }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.7);
                z-index: 400;
            }
            .sidebar-overlay.active { display: block; }
            .main-content { margin-right: 0; padding: 20px; padding-top: 60px; }
            body { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .table-search input { width: 100%; }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }

        .toggle-switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); transition: var(--transition); border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: var(--transition); border-radius: 50%; }
        input:checked + .toggle-slider { background: var(--success); }
        input:checked + .toggle-slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<!-- زر القائمة للجوال -->
<button id="mobileMenuToggle" onclick="toggleMobileMenu()">☰</button>

<!-- خلفية القائمة للجوال -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileMenu()"></div>

<!-- ==================== الشريط الجانبي ==================== -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <span class="icon">🦅</span>
        الرعدي أونلاين
    </div>
    
    <div class="nav-section">
        <div class="nav-section-title">الرئيسية</div>
        <button class="nav-item active" onclick="showTab('dashboard')">
            <span class="icon">📊</span> لوحة القيادة
            <span class="nav-badge" id="newOrdersBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" onclick="showTab('analytics')">
            <span class="icon">📈</span> التحليلات المتقدمة
        </button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">الإدارة</div>
        <button class="nav-item" onclick="showTab('products')">
            <span class="icon">📦</span> المنتجات
            <span class="nav-badge" id="lowStockBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" onclick="showTab('orders')">
            <span class="icon">📋</span> الطلبات
            <span class="nav-badge" id="pendingOrdersBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" onclick="showTab('customers')"><span class="icon">👥</span> العملاء</button>
        <button class="nav-item" onclick="showTab('coupons')"><span class="icon">🎫</span> الكوبونات</button>
        <button class="nav-item" onclick="showTab('rfq')">
            <span class="icon">💰</span> طلبات التفاوض
            <span class="nav-badge" id="rfqBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" onclick="showTab('banners')"><span class="icon">🖼️</span> البانرات</button>
        <button class="nav-item" onclick="showTab('sounds')"><span class="icon">🔊</span> الصوتيات</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">التحليلات</div>
        <button class="nav-item" onclick="showTab('reports')"><span class="icon">📈</span> التقارير</button>
        <button class="nav-item" onclick="showTab('maintenance')"><span class="icon">🔧</span> الصيانة التنبؤية</button>
        <button class="nav-item" onclick="showTab('competitors')"><span class="icon">🏪</span> مراقبة المنافسين</button>
        <button class="nav-item" onclick="showTab('predictions')"><span class="icon">🔮</span> تنبؤات المخزون</button>
    </div>

    <div class="nav-section">
        <div class="nav-section-title">النظام</div>
        <button class="nav-item" onclick="showTab('settings')"><span class="icon">⚙️</span> الإعدادات</button>
        <button class="nav-item" onclick="showTab('customize')"><span class="icon">🎨</span> التخصيص</button>
        <button class="nav-item" onclick="showTab('media')"><span class="icon">📁</span> مركز الوسائط</button>
        <button class="nav-item" onclick="showTab('trash')"><span class="icon">🗑️</span> سلة المحذوفات</button>
        <button class="nav-item" onclick="showTab('logs')"><span class="icon">📝</span> سجل النشاطات</button>
        <button class="nav-item" onclick="showTab('backup')"><span class="icon">💾</span> النسخ الاحتياطي</button>
        <button class="nav-item" onclick="showTab('roles')"><span class="icon">🔐</span> الصلاحيات</button>
    </div>

    <div class="sidebar-footer">
        <button class="nav-item" onclick="window.location.href='/'">
            <span class="icon">🏠</span> زيارة المتجر
        </button>
        <button class="nav-item" onclick="showTab('chat')">
            <span class="icon">💬</span> الدردشة الحية
        </button>
        <button class="nav-item" onclick="logout()">
            <span class="icon">🚪</span> تسجيل خروج
        </button>
    </div>
</aside>

<!-- ==================== المحتوى الرئيسي ==================== -->
<main class="main-content" id="mainContent">
    <!-- المحتوى الديناميكي -->
</main>

<script>
// ==================== المتغيرات العامة ====================
const API = '/api';
let adminToken = localStorage.getItem('adminToken') || '';
let currentTab = 'dashboard';
let editingProductId = null;
let allProductsCache = [];
let allOrdersCache = [];
let allCustomersCache = [];

// ==================== دوال القائمة للجوال ====================
function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
}

function closeMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

// ==================== المصادقة ====================
async function initAuth() {
    if (!adminToken) {
        const pass = prompt('🔐 أدخل كلمة مرور المدير:');
        if (pass) {
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'alradi@gmail.com', password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    location.reload();
                } else {
                    alert('❌ كلمة المرور غير صحيحة');
                    window.location.href = '/';
                }
            } catch (e) {
                alert('❌ فشل الاتصال');
                window.location.href = '/';
            }
        } else {
            window.location.href = '/';
        }
    }
}

function logout() {
    if (confirm('تسجيل خروج من لوحة التحكم؟')) {
        localStorage.removeItem('adminToken');
        window.location.href = '/';
    }
}

// ==================== التنقل ====================
function showTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navItem = event?.target?.closest('.nav-item');
    if (navItem) navItem.classList.add('active');
    
    closeMobileMenu();
    
    const main = document.getElementById('mainContent');
    
    switch (tabName) {
        case 'dashboard': buildDashboard(); break;
        case 'analytics': buildAnalytics(); break;
        case 'products': buildProducts(); break;
        case 'orders': buildOrders(); break;
        case 'customers': buildCustomers(); break;
        case 'coupons': buildCoupons(); break;
        case 'rfq': buildRFQ(); break;
        case 'banners': buildBanners(); break;
        case 'sounds': buildSounds(); break;
        case 'reports': buildReports(); break;
        case 'trash': buildTrash(); break;
        case 'logs': buildLogs(); break;
        case 'maintenance': buildMaintenance(); break;
        case 'competitors': buildCompetitors(); break;
        case 'predictions': buildPredictions(); break;
        case 'settings': buildSettings(); break;
        case 'customize': buildCustomize(); break;
        case 'media': buildMedia(); break;
        case 'backup': buildBackup(); break;
        case 'roles': buildRoles(); break;
        case 'chat': buildChat(); break;
    }
}
    </script>
    <script>
// ==================== لوحة القيادة ====================
async function buildDashboard() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h1 class="page-title"><span class="icon">📊</span> لوحة القيادة</h1>
            <div class="page-actions">
                <button class="btn btn-outline btn-sm" onclick="loadDashboard()">🔄 تحديث</button>
                <button class="btn btn-primary btn-sm" onclick="showTab('products')">➕ إضافة منتج</button>
                <button class="btn btn-outline btn-sm" onclick="exportDashboardPDF()">📄 تصدير</button>
            </div>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-label">جاري التحميل...</div></div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
            <div>
                <div class="table-container">
                    <div class="table-header">
                        <span class="table-title">📋 آخر الطلبات</span>
                        <button class="btn btn-sm btn-outline" onclick="showTab('orders')">عرض الكل</button>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                        <tbody id="recentOrdersBody"><tr><td colspan="5">جاري التحميل...</td></tr></tbody>
                    </table>
                </div>
                <div class="table-container" style="margin-top:25px;">
                    <div class="table-header">
                        <span class="table-title">⚠️ منتجات أوشكت على النفاد</span>
                    </div>

function drawChart(orders) {
    const canvas = document.getElementById('salesChart');
    if (!canvas || !orders.length) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#C9A84C';
    ctx.lineWidth = 3;
    ctx.fillStyle = 'rgba(201,168,76,0.1)';
    const step = canvas.width / (orders.length - 1 || 1);
    const maxVal = Math.max(...orders.map(o => o.pricing?.total || 0), 1);
    const points = orders.map((o, i) => ({
        x: i * step,
        y: canvas.height - ((o.pricing?.total || 0) / maxVal) * (canvas.height - 50) - 25
    }));
    ctx.moveTo(points[0].x, points[0].y);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, canvas.height);
    ctx.lineTo(points[0].x, canvas.height);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#C9A84C';
        ctx.fill();
    });
}

function updateBadges(d) {
    if (d.todayOrders > 0) {
        document.getElementById('newOrdersBadge').textContent = d.todayOrders;
        document.getElementById('newOrdersBadge').style.display = 'inline';

        document.getElementById('rfqBadge').style.display = 'inline';
    }
}

async function loadAnalytics(period) {
    try {
        const res = await fetch(`${API}/admin/reports?type=sales&period=${period}`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (data.success && data.data.length) {
            document.getElementById('analyticsBody').innerHTML = data.data.map((r, i, arr) => {
                const prevRevenue = i > 0 ? arr[i-1].revenue : r.revenue;
                const growth = prevRevenue > 0 ? ((r.revenue - prevRevenue) / prevRevenue * 100).toFixed(1) : 0;
                return `
                    <tr>
                        <td><strong>${r._id}</strong></td>
                        <td>${r.orders}</td>
                        <td>${(r.revenue || 0).toLocaleString()} ر.س</td>
                        <td>${(r.averageOrder || 0).toFixed(2)} ر.س</td>
                        <td style="color:${growth >= 0 ? 'var(--success)' : 'var(--danger)'};">${growth >= 0 ? '+' : ''}${growth}%</td>
                    </tr>
                `;
            }).join('');
            drawAnalyticsChart(data.data);
        } else {
            document.getElementById('analyticsBody').innerHTML = '<tr><td colspan="5">لا توجد بيانات</td></tr>';
        }
    } catch (e) { console.error(e); }
}

function drawAnalyticsChart(data) {
    const canvas = document.getElementById('analyticsChart');
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const maxRev = Math.max(...data.map(d => d.revenue || 0), 1);
    const barWidth = (w - 120) / data.length - 10;
    data.forEach((d, i) => {
        const x = 60 + i * (barWidth + 10);
        const barH = ((d.revenue || 0) / maxRev) * (h - 100);
        const y = h - barH - 40;
        const gradient = ctx.createLinearGradient(x, y, x, h - 40);
        gradient.addColorStop(0, '#C9A84C');
        gradient.addColorStop(1, 'rgba(201,168,76,0.2)');
        ctx.fillStyle = gradient;
        ctx.fillRect(x, y, barWidth, barH);
        ctx.fillStyle = '#A0A0B0';
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(d._id.substring(5), x + barWidth/2, h - 10);
        ctx.fillStyle = '#C9A84C';
        ctx.fillText((d.revenue || 0).toLocaleString(), x + barWidth/2, y - 10);
    });
}

function calcDiscount() {
    const price = parseFloat(document.getElementById('prodPrice')?.value);
    const compare = parseFloat(document.getElementById('prodComparePrice')?.value);
    const el = document.getElementById('prodDiscount');
    if (el) el.value = (compare && price && compare > 0) ? Math.round((1 - price / compare) * 100) + '%' : '';
}

async function saveProduct() {
    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    if (!name || !category) return alert('⚠️ اسم المنتج والقسم مطلوبان');
    const body = {
        name, category,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        comparePrice: parseFloat(document.getElementById('prodComparePrice').value) || null,
        stock: parseInt(document.getElementById('prodStock').value) || 0,
        description: document.getElementById('prodDescription').value.trim(),
        images: document.getElementById('prodImage').value ? [{ url: document.getElementById('prodImage').value.trim(), type: 'main' }] : [],
        tags: document.getElementById('prodTags').value.split(',').map(t => t.trim()).filter(Boolean),
        isFeatured: document.getElementById('prodFeatured').value === 'true',
        warrantyInfo: document.getElementById('prodWarranty').value,
        maintenanceInterval: parseInt(document.getElementById('prodMaintenance').value) || 90
    };
    const url = editingProductId ? `${API}/products/${editingProductId}` : `${API}/products`;
    const method = editingProductId ? 'PUT' : 'POST';
    try {
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify(body) });
        const data = await res.json();
        if (data.success) { alert('✅ تم حفظ المنتج بنجاح'); toggleProductForm(); loadProducts(); }

}

function showToast(msg) {
    const existing = document.querySelector('.admin-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'admin-toast';
    toast.textContent = msg;
    toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:15px 30px;border-radius:50px;border:1px solid var(--border);z-index:2000;box-shadow:var(--shadow-lg);font-weight:bold;font-size:14px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;white-space:nowrap;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ==================== الطلبات ====================
async function buildOrders() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `

            <h1 class="page-title"><span class="icon">📋</span> إدارة الطلبات</h1>

            <div class="table-header">

                        <th>طريقة الدفع</th>
                        <th>الشحن</th>
                        <th>الحالة</th>
                        <th>التاريخ</th>
                        <th>تغيير الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <tr><td colspan="10" style="text-align:center;">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
        <div style="text-align:center; margin-top:20px;" id="ordersPagination"></div>

    loadOrders('all');

async function loadOrders(filter = 'all') {
    try {
        const url = `${API}/orders${filter !== 'all' ? '?status=' + filter : ''}`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            allOrdersCache = data.data;
            renderOrders(data.data);
            updateOrdersStats(data.data);
        }
    } catch (e) { console.error(e); }
}

function updateOrdersStats(orders) {
    const pending = orders.filter(o => o.status === 'pending').length;
    const processing = orders.filter(o => o.status === 'processing' || o.status === 'confirmed').length;
    const shipped = orders.filter(o => o.status === 'shipped').length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    const totalRevenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.pricing?.total || 0), 0);

    document.getElementById('ordersStats').innerHTML = `
        <div class="stat-card">
            <div class="stat-header"><span class="stat-label">⏳ قيد الانتظار</span></div>
            <div class="stat-value" style="color:var(--warning);">${pending}</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><span class="stat-label">🔄 قيد المعالجة</span></div>
            <div class="stat-value" style="color:var(--info);">${processing}</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><span class="stat-label">🚚 تم الشحن</span></div>
            <div class="stat-value" style="color:#9B59B6;">${shipped}</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><span class="stat-label">✅ تم التسليم</span></div>
            <div class="stat-value" style="color:var(--success);">${delivered}</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><span class="stat-label">💰 إجمالي الإيرادات</span></div>
            <div class="stat-value">${totalRevenue.toLocaleString()} ر.س</div>
        </div>
    `;
}

function renderOrders(orders) {
    const tbody = document.getElementById('ordersBody');
    if (!tbody) return;
    if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:30px;">لا توجد طلبات</td></tr>';
        return;
    }
    tbody.innerHTML = orders.map(o => `
        <tr>
            <td><strong>${o.orderNumber}</strong></td>
            <td>
                ${o.user?.fullName || o.user || 'غير معروف'}
                ${o.user?.email ? `<br><small style="color:var(--muted);">${o.user.email}</small>` : ''}
                ${o.user?.phone ? `<br><small style="color:var(--muted);">${o.user.phone}</small>` : ''}
            </td>
            <td>${(o.items || []).length} منتج</td>
            <td style="color:var(--primary); font-weight:bold;">${(o.pricing?.total || 0).toFixed(2)} ر.س</td>
            <td>${getPaymentLabel(o.payment?.method)}</td>
            <td>${getShippingLabel(o.shipping?.type)}</td>
            <td><span class="badge badge-${o.status || 'pending'}">${getStatusLabel(o.status)}</span></td>
            <td>${new Date(o.createdAt).toLocaleDateString('ar-SA')}<br><small style="color:var(--muted);">${new Date(o.createdAt).toLocaleTimeString('ar-SA')}</small></td>
            <td>
                <select onchange="updateOrderStatus('${o._id}', this.value)" 
                        style="padding:6px; border-radius:4px; background:var(--bg); color:var(--text); border:1px solid var(--border); width:130px;">
                    <option value="">اختر...</option>
                    <option value="confirmed">✅ مؤكد</option>
                    <option value="processing">🔄 معالجة</option>
                    <option value="shipped">🚚 تم الشحن</option>
                    <option value="delivered">📦 تم التسليم</option>
                    <option value="cancelled">❌ ملغي</option>
                    <option value="returned">↩️ مرتجع</option>
                </select>
            </td>
            <td>
                <button class="btn btn-outline btn-xs" onclick="viewOrderDetail('${o._id}')" title="تفاصيل">👁️</button>
                <button class="btn btn-outline btn-xs" onclick="printOrderInvoice('${o.orderNumber}')" title="طباعة">🖨️</button>
            </td>
        </tr>
    `).join('');
    document.getElementById('ordersPagination').innerHTML = `<span style="color:var(--muted);">إجمالي ${orders.length} طلب</span>`;
}

function getPaymentLabel(method) {
    const labels = { 'cod': '💵 عند الاستلام', 'card': '💳 بطاقة', 'wallet': '📱 محفظة', 'bnpl': '📅 تقسيط' };
    return labels[method] || method || '—';
}

function getShippingLabel(type) {
    const labels = { 'internal': '🚚 بري', 'express': '✈️ جوي', 'courier': '🛵 مندوب' };
    return labels[type] || type || '—';
}

function getStatusLabel(status) {
    const labels = { 'pending': '⏳ انتظار', 'confirmed': '✅ مؤكد', 'processing': '🔄 معالجة', 'shipped': '🚚 شحن', 'delivered': '📦 تسليم', 'cancelled': '❌ ملغي', 'returned': '↩️ مرتجع' };
    return labels[status] || status;
}

function filterOrders(query) {
    const filtered = query 
        ? allOrdersCache.filter(o => 
            o.orderNumber?.toLowerCase().includes(query.toLowerCase()) ||
            o.user?.fullName?.toLowerCase().includes(query.toLowerCase()) ||
            o.user?.email?.toLowerCase().includes(query.toLowerCase())
          )
        : allOrdersCache;
    renderOrders(filtered);
}

async function updateOrderStatus(id, status) {
    if (!status) return;
    try {
        await fetch(`${API}/orders/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
            body: JSON.stringify({ status })
        });
        showToast(`✅ تم تحديث حالة الطلب`);
        loadOrders(document.querySelector('#tab-orders select')?.value || 'all');
    } catch (e) { alert('❌ فشل تحديث الحالة'); }
}

async function viewOrderDetail(id) {
    try {
        const res = await fetch(`${API}/orders/${id}`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            const o = data.data;
            let itemsHtml = (o.items || []).map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.price} ر.س</td><td>${(i.price * i.quantity).toFixed(2)} ر.س</td></tr>`).join('');
            const modal = document.createElement('div');
            modal.className = 'modal-overlay active';
            modal.innerHTML = `
                <div class="modal modal-lg">
                    <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
                    <h2 style="color:var(--primary);">📋 تفاصيل الطلب – ${o.orderNumber}</h2>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px 0;">
                        <div><strong>العميل:</strong> ${o.user?.fullName || 'غير معروف'}</div>
                        <div><strong>البريد:</strong> ${o.user?.email || '—'}</div>
                        <div><strong>الهاتف:</strong> ${o.user?.phone || '—'}</div>
                        <div><strong>الحالة:</strong> <span class="badge badge-${o.status}">${getStatusLabel(o.status)}</span></div>
                        <div><strong>الدفع:</strong> ${getPaymentLabel(o.payment?.method)}</div>
                        <div><strong>الشحن:</strong> ${getShippingLabel(o.shipping?.type)}</div>
                    </div>
                    <table class="data-table"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>المجموع</th></tr></thead><tbody>${itemsHtml}</tbody></table>
                    <div style="text-align:left; font-size:20px; font-weight:bold; color:var(--primary); margin-top:15px;">الإجمالي: ${(o.pricing?.total || 0).toFixed(2)} ر.س</div>
                </div>
            `;
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            document.body.appendChild(modal);
        }
    } catch (e) { alert('❌ فشل جلب التفاصيل'); }
}

function printOrderInvoice(orderNumber) {
    window.open(`${API}/invoice/${orderNumber}`, '_blank');
}

function exportOrders() { showToast('📄 جاري تصدير الطلبات...'); }

async function loadCustomers() {
    try {
        const res = await fetch(`${API}/users?role=customer`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            allCustomersCache = data.data;
            renderCustomers(data.data);
            updateCustomersStats(data.data);
        }
    } catch (e) { console.error(e); }
}

function updateCustomersStats(customers) {
    const total = customers.length;
    const newToday = customers.filter(c => new Date(c.createdAt) >= new Date(new Date().setHours(0,0,0,0))).length;
    const active = customers.filter(c => c.lastLogin && new Date(c.lastLogin) >= new Date(Date.now() - 30*86400000)).length;
    const bronze = customers.filter(c => c.loyaltyTier === 'برونزي').length;
    const silver = customers.filter(c => c.loyaltyTier === 'فضي').length;
    const gold = customers.filter(c => c.loyaltyTier === 'ذهبي').length;
    const platinum = customers.filter(c => c.loyaltyTier === 'بلاتيني').length;

    document.getElementById('customersStats').innerHTML = `
        <div class="stat-card"><div class="stat-label">👥 إجمالي العملاء</div><div class="stat-value">${total}</div><div class="stat-footer">${newToday} جديد اليوم</div></div>
        <div class="stat-card"><div class="stat-label">🟢 نشط (30 يوم)</div><div class="stat-value" style="color:var(--success);">${active}</div></div>
        <div class="stat-card"><div class="stat-label">🥉 برونزي</div><div class="stat-value" style="color:#CD7F32;">${bronze}</div></div>
        <div class="stat-card"><div class="stat-label">🥈 فضي</div><div class="stat-value" style="color:#C0C0C0;">${silver}</div></div>
        <div class="stat-card"><div class="stat-label">🥇 ذهبي</div><div class="stat-value" style="color:#FFD700;">${gold}</div></div>
        <div class="stat-card"><div class="stat-label">💎 بلاتيني</div><div class="stat-value" style="color:#E5E4E2;">${platinum}</div></div>
    `;
}

function renderCustomers(customers) {
    const tbody = document.getElementById('customersBody');
    if (!tbody) return;
    if (!customers.length) { tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">لا يوجد عملاء</td></tr>'; return; }
    tbody.innerHTML = customers.map(u => `
        <tr>
            <td><strong>${u.fullName || 'غير معروف'}</strong></td>
            <td>${u.email || '—'}</td>
            <td>${u.phone || '—'}</td>
            <td style="color:var(--primary); font-weight:bold;">${u.loyaltyPoints || 0}</td>
            <td><span style="color:${getTierColor(u.loyaltyTier)}; font-weight:bold;">${u.loyaltyTier || 'برونزي'}</span></td>
            <td>${(u.totalSpent || 0).toLocaleString()} ر.س</td>
            <td>${u.orderCount || u.orders || 0}</td>
            <td>${u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('ar-SA') : '—'}</td>
            <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar-SA') : '—'}</td>
            <td>
                <button class="btn btn-outline btn-xs" onclick="viewCustomerDetail('${u._id}')">👁️</button>
                <button class="btn btn-outline btn-xs" onclick="sendMessageToCustomer('${u._id}')">📧</button>
            </td>
        </tr>
    `).join('');
}

function getTierColor(tier) {
    const colors = { 'برونزي': '#CD7F32', 'فضي': '#C0C0C0', 'ذهبي': '#FFD700', 'بلاتيني': '#E5E4E2' };
    return colors[tier] || '#CD7F32';
}

function filterCustomers(query) {
    const filtered = query ? allCustomersCache.filter(u => u.fullName?.toLowerCase().includes(query.toLowerCase()) || u.email?.toLowerCase().includes(query.toLowerCase()) || u.phone?.includes(query)) : allCustomersCache;
    renderCustomers(filtered);
}

async function viewCustomerDetail(id) {
    try {
        const res = await fetch(`${API}/users/${id}`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            const u = data.data;
            alert(`👤 ${u.fullName}\n📧 ${u.email}\n📱 ${u.phone}\n⭐ ${u.loyaltyTier || 'برونزي'} – ${u.loyaltyPoints || 0} نقطة\n💰 إجمالي المشتريات: ${(u.totalSpent || 0).toLocaleString()} ر.س\n📦 عدد الطلبات: ${u.orders || 0}\n📅 تاريخ التسجيل: ${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ar-SA') : '—'}`);
        }
    } catch (e) { alert('❌ فشل'); }
}

function sendMessageToCustomer(id) { showToast('📧 فتح نافذة الرسائل...'); }
function exportCustomers() { showToast('📄 جاري تصدير العملاء...'); }

async function buildCoupons() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
        <div class="page-header">
            <h1 class="page-title"><span class="icon">🎫</span> إدارة الكوبونات</h1>
            <button class="btn btn-primary" onclick="toggleCouponForm()">➕ إضافة كوبون جديد</button>
        </div>
        <div class="form-card" id="couponForm">
            <h3>🎫 إضافة كوبون خصم</h3>
            <div class="form-row">
                <div class="form-group"><label>كود الكوبون *</label><input type="text" id="couponCode" placeholder="مثال: SALE50"></div>
                <div class="form-group"><label>نوع الخصم</label><select id="couponType"><option value="percentage">نسبة مئوية (%)</option><option value="fixed">قيمة ثابتة (ر.س)</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>قيمة الخصم *</label><input type="number" id="couponValue" placeholder="10" min="0"></div>
                <div class="form-group"><label>الحد الأدنى للطلب (ر.س)</label><input type="number" id="couponMinOrder" value="0" min="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>الحد الأقصى للاستخدام</label><input type="number" id="couponMaxUses" value="100" min="1"></div>
                <div class="form-group"><label>تاريخ الانتهاء</label><input type="date" id="couponExpiry"></div>
            </div>
            <div class="form-group"><label>وصف الكوبون</label><input type="text" id="couponDescription" placeholder="خصم خاص للعملاء الجدد"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="saveCoupon()">💾 حفظ الكوبون</button>
                <button class="btn btn-outline" onclick="toggleCouponForm()">إلغاء</button>
            </div>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead><tr><th>الكود</th><th>النوع</th><th>القيمة</th><th>الحد الأدنى</th><th>الاستخدامات</th><th>تاريخ الانتهاء</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                <tbody id="couponsBody"><tr><td colspan="8">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    `;
    loadCoupons();
}

function toggleCouponForm() { const form = document.getElementById('couponForm'); if (form) form.classList.toggle('active'); }

async function saveCoupon() {
    const code = document.getElementById('couponCode').value.trim();
    const type = document.getElementById('couponType').value;
    const value = parseFloat(document.getElementById('couponValue').value);
    const minOrder = parseFloat(document.getElementById('couponMinOrder').value) || 0;
    const maxUses = parseInt(document.getElementById('couponMaxUses').value) || 100;
    const expiry = document.getElementById('couponExpiry').value;
    const description = document.getElementById('couponDescription').value.trim();
    if (!code || !value) return alert('⚠️ كود الكوبون وقيمة الخصم مطلوبان');
    try {
        const res = await fetch(`${API}/coupons`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }, body: JSON.stringify({ code, discountType: type, discountValue: value, minOrderAmount: minOrder, maxUses, expiryDate: expiry || null, description }) });
        const data = await res.json();
        if (data.success) { alert('✅ تم إضافة الكوبون'); toggleCouponForm(); loadCoupons(); }
        else alert('❌ ' + (data.error || 'فشل'));
    } catch (e) { alert('❌ فشل الاتصال'); }
}

async function loadCoupons() {
    try {
        const res = await fetch(`${API}/coupons`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            document.getElementById('couponsBody').innerHTML = data.data.length ? data.data.map(c => `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.discountType === 'percentage' ? 'نسبة' : 'ثابت'}</td>
                    <td style="color:var(--primary); font-weight:bold;">${c.discountValue}${c.discountType === 'percentage' ? '%' : ' ر.س'}</td>
                    <td>${c.minOrderAmount || 0} ر.س</td>
                    <td>${c.usedCount || 0} / ${c.maxUses || '∞'}</td>
                    <td>${c.expiryDate ? new Date(c.expiryDate).toLocaleDateString('ar-SA') : 'مفتوح'}</td>
                    <td><span style="color:${c.isActive ? 'var(--success)' : 'var(--danger)'};">${c.isActive ? '✅ نشط' : '❌ غير نشط'}</span></td>
                    <td><button class="btn btn-danger btn-xs" onclick="deleteCoupon('${c.code}')">${c.isActive ? 'تعطيل' : 'حذف'}</button></td>
                </tr>
            `).join('') : '<tr><td colspan="8" style="text-align:center;">لا توجد كوبونات</td></tr>';
        }

async function loadReport() {
    const type = document.getElementById('reportType').value;
    const period = document.getElementById('reportPeriod').value;
    const startDate = document.getElementById('reportStartDate').value;
    const endDate = document.getElementById('reportEndDate').value;
    
    let url = `${API}/admin/reports?type=${type}&period=${period}`;
    if (startDate) url += `&startDate=${startDate}`;
    if (endDate) url += `&endDate=${endDate}`;
    
    try {
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success && data.data.length) {
            let html = '<table class="data-table"><thead><tr>';
            if (type === 'sales') {
                html += '<th>التاريخ</th><th>الطلبات</th><th>الإيرادات</th><th>متوسط الطلب</th><th>أعلى طلب</th><th>معدل النمو</th>';
            } else if (type === 'products') {
                html += '<th>#</th><th>المنتج</th><th>القسم</th><th>عدد المبيعات</th><th>الإيرادات</th><th>المخزون الحالي</th><th>التقييم</th>';
            } else if (type === 'customers') {
                html += '<th>العميل</th><th>البريد</th><th>عدد الطلبات</th><th>إجمالي المشتريات</th><th>نقاط الولاء</th><th>المستوى</th>';
            } else if (type === 'orders') {
                html += '<th>رقم الطلب</th><th>العميل</th><th>عدد المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th>';
            } else {
                html += '<th>المنتج</th><th>المخزون</th><th>القسم</th><th>السعر</th><th>المبيعات</th><th>الحالة</th>';
            }
            html += '</tr></thead><tbody>';
            
            data.data.forEach((r, i) => {
                html += '<tr>';
                if (type === 'sales') {
                    html += `<td>${r._id}</td><td>${r.orders}</td><td>${(r.revenue || 0).toLocaleString()} ر.س</td><td>${(r.averageOrder || 0).toFixed(2)} ر.س</td><td>${(r.maxOrder || 0).toLocaleString()} ر.س</td><td>${r.growthRate || 0}%</td>`;
                } else if (type === 'products') {
                    html += `<td>${i + 1}</td><td>${r.name || r._id}</td><td>${r.category || '—'}</td><td>${r.salesCount || 0}</td><td>${(r.revenue || 0).toLocaleString()} ر.س</td><td style="color:${r.stock <= 5 ? 'var(--danger)' : 'var(--success)'};">${r.stock || 0}</td><td>${'⭐'.repeat(Math.round(r.ratings?.average || 0))}</td>`;
                } else if (type === 'customers') {
                    html += `<td>${r.fullName || r._id}</td><td>${r.email || '—'}</td><td>${r.orderCount || 0}</td><td>${(r.totalSpent || 0).toLocaleString()} ر.س</td><td>${r.loyaltyPoints || 0}</td><td>${r.loyaltyTier || 'برونزي'}</td>`;
                } else if (type === 'orders') {
                    html += `<td>${r.orderNumber}</td><td>${r.user?.fullName || '—'}</td><td>${(r.items || []).length}</td><td>${(r.pricing?.total || 0).toFixed(2)} ر.س</td><td><span class="badge badge-${r.status}">${r.status}</span></td><td>${new Date(r.createdAt).toLocaleDateString('ar-SA')}</td>`;
                } else {
                    html += `<td>${r.name || r._id}</td><td style="color:${r.stock <= 5 ? 'var(--danger)' : 'var(--success)'};">${r.stock || 0}</td><td>${r.category || '—'}</td><td>${r.price || 0} ر.س</td><td>${r.salesCount || 0}</td><td>${r.isActive ? '✅ نشط' : '❌ غير نشط'}</td>`;
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            // إضافة ملخص
            if (type === 'sales') {
                const totalRevenue = data.data.reduce((s, r) => s + (r.revenue || 0), 0);
                const totalOrders = data.data.reduce((s, r) => s + (r.orders || 0), 0);
                html += `<div class="stats-grid" style="margin-top:20px;">
                    <div class="stat-card"><div class="stat-label">💰 إجمالي الإيرادات</div><div class="stat-value">${totalRevenue.toLocaleString()} ر.س</div></div>
                    <div class="stat-card"><div class="stat-label">📋 إجمالي الطلبات</div><div class="stat-value">${totalOrders}</div></div>
                    <div class="stat-card"><div class="stat-label">📊 متوسط الطلب</div><div class="stat-value">${totalOrders > 0 ? (totalRevenue / totalOrders).toFixed(2) : '0.00'} ر.س</div></div>
                </div>`;
            }
            
            document.getElementById('reportContent').innerHTML = html;
        } else {
            document.getElementById('reportContent').innerHTML = '<p style="color:var(--muted); text-align:center;">لا توجد بيانات للفترة المحددة</p>';
        }
    } catch (e) { console.error(e); }
}

    const period = document.getElementById('reportPeriod').value;
    showToast(`📄 جاري تصدير تقرير ${type} (${period}) بصيغة ${format.toUpperCase()}...`);
}

async function loadTrash() {
    try {
        const res = await fetch(`${API}/trash`, {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        const data = await res.json();
        if (data.success) {
            const items = data.data;
            document.getElementById('trashStats').innerHTML = `

async function restoreItem(id) {
    try {
        await fetch(`${API}/trash/restore/${id}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadTrash();
        showToast('✅ تمت استعادة العنصر بنجاح');
    } catch (e) { alert('❌ فشلت الاستعادة'); }
}

async function permanentlyDelete(id) {
    if (!confirm('⚠️ تحذير: الحذف النهائي لا يمكن التراجع عنه!')) return;
    try {
        await fetch(`${API}/trash/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        loadTrash();
        showToast('🗑️ تم الحذف النهائي');
    } catch (e) { alert('❌ فشل الحذف'); }
}

async function emptyTrash() {
    if (!confirm('⚠️ هل أنت متأكد من تفريغ سلة المحذوفات بالكامل؟')) return;
    const items = document.querySelectorAll('#trashBody tr');
    let count = 0;
    for (const row of items) {
        const btn = row.querySelector('button');
        if (btn && btn.textContent.includes('حذف نهائي')) {
            const id = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
            if (id) {
                await fetch(`${API}/trash/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
                count++;
            }
        }
    }
    loadTrash();
    showToast(`🗑️ تم حذف ${count} عنصر نهائياً`);
}

async function restoreAllTrash() {
    if (!confirm('استعادة جميع العناصر من سلة المحذوفات؟')) return;
    const items = document.querySelectorAll('#trashBody tr');
    let count = 0;
    for (const row of items) {
        const restoreBtn = row.querySelector('.btn-success');
        if (restoreBtn) {
            const id = restoreBtn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
            if (id) {
                await fetch(`${API}/trash/restore/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${adminToken}` } });
                count++;
            }
        }
    }
    loadTrash();
    showToast(`↩️ تمت استعادة ${count} عنصر`);
}

async function loadLogs(filter = 'all') {
    try {
        let url = `${API}/audit-logs?limit=100`;
        if (filter !== 'all') url += `&action=${filter}`;
        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
        const data = await res.json();
        if (data.success) {
            document.getElementById('logsBody').innerHTML = data.data.length
                ? data.data.map((l, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${l.userId || 'نظام'}</td>
                        <td><span class="badge badge-${getLogBadge(l.action)}">${l.action}</span></td>
                        <td>${l.details || '—'}</td>
                        <td>${l.targetTable || '—'}</td>
                        <td>${l.createdAt ? new Date(l.createdAt).toLocaleString('ar-SA') : '—'}</td>
                        <td><small style="color:var(--muted);">${l.ipAddress || '—'}</small></td>
                    </tr>
                `).join('')
                : '<tr><td colspan="7" style="text-align:center;">لا توجد نشاطات مسجلة</td></tr>';
            document.getElementById('logsPagination').innerHTML = `<span style="color:var(--muted);">${data.data.length} نشاط</span>`;
        }
    } catch (e) { console.error(e); }
}

function getLogBadge(action) {
    if (action?.includes('DELETE')) return 'cancelled';
    if (action?.includes('CREATE')) return 'delivered';
    if (action?.includes('UPDATE')) return 'processing';
    if (action?.includes('LOGIN')) return 'confirmed';
    return 'pending';
}

function exportLogs() { showToast('📄 جاري تصدير سجل النشاطات...'); }

async function clearLogs() {
    if (!confirm('⚠️ مسح جميع النشاطات؟')) return;
    showToast('🗑️ جاري مسح السجل...');
    // ننتظر تنفيذ API للمسح
    setTimeout(() => { loadLogs('all'); showToast('✅ تم مسح السجل'); }, 1000);
}

async function handleMediaUpload(files) {

    try {
        const res = await fetch(`${API}/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${adminToken}` }, body: form });

        if (data.success) { showToast(`✅ تم رفع ${data.data.length} ملف`); loadMedia(); }

}

let notifications = [];
function addNotification(title, message, type = 'info') {
    notifications.unshift({ title, message, type, time: new Date(), read: false });
    if (notifications.length > 50) notifications.pop();
    updateNotificationBadge();
}

function updateNotificationBadge() {
    const unread = notifications.filter(n => !n.read).length;
    const badge = document.getElementById('notificationBadge');
    if (badge) {
        badge.textContent = unread;
        badge.style.display = unread > 0 ? 'inline' : 'none';
    }
}

function globalSearch(query) {
    if (!query || query.length < 2) return;
    const results = [];
    // بحث في المنتجات
    allProductsCache.forEach(p => {
        if (p.name?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '📦 منتج', name: p.name, id: p._id, action: 'editProduct' });
        }
    });
    // بحث في الطلبات
    allOrdersCache.forEach(o => {
        if (o.orderNumber?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '📋 طلب', name: o.orderNumber, id: o._id, action: 'viewOrderDetail' });
        }
    });
    // بحث في العملاء
    allCustomersCache.forEach(c => {
        if (c.fullName?.toLowerCase().includes(query.toLowerCase()) || c.email?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '👤 عميل', name: c.fullName, id: c._id, action: 'viewCustomerDetail' });
        }
    });
    return results.slice(0, 20);
}

async function loadInventory() {
    try {
        const res = await fetch(`${API}/products?limit=200`);
        const data = await res.json();
        if (data.success) {
            const products = data.data;
            const lowStock = products.filter(p => p.stock <= 5 && p.isActive).length;
            const outOfStock = products.filter(p => p.stock === 0 && p.isActive).length;
            const totalValue = products.reduce((s, p) => s + (p.price * p.stock), 0);
            const totalCost = products.reduce((s, p) => s + ((p.cost || p.price * 0.6) * p.stock), 0);

            document.getElementById('inventoryStats').innerHTML = `
                <div class="stat-card"><div class="stat-label">📦 إجمالي المنتجات</div><div class="stat-value">${products.length}</div></div>
                <div class="stat-card"><div class="stat-label">⚠️ منخفضة المخزون</div><div class="stat-value" style="color:var(--warning);">${lowStock}</div></div>
                <div class="stat-card"><div class="stat-label">❌ نفذ المخزون</div><div class="stat-value" style="color:var(--danger);">${outOfStock}</div></div>
                <div class="stat-card"><div class="stat-label">💰 قيمة المخزون</div><div class="stat-value">${totalValue.toLocaleString()} ر.س</div></div>
                <div class="stat-card"><div class="stat-label">📊 التكلفة الإجمالية</div><div class="stat-value">${totalCost.toLocaleString()} ر.س</div></div>
                <div class="stat-card"><div class="stat-label">💎 الربح المتوقع</div><div class="stat-value" style="color:var(--success);">${(totalValue - totalCost).toLocaleString()} ر.س</div></div>
            `;

            document.getElementById('inventoryBody').innerHTML = products.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.category || 'عام'}</td>
                    <td style="color:${p.stock <= 5 ? 'var(--danger)' : p.stock <= 20 ? 'var(--warning)' : 'var(--success)'}; font-weight:bold;">${p.stock}</td>
                    <td>${p.minStock || 5}</td>
                    <td>${(p.cost || p.price * 0.6).toFixed(2)} ر.س</td>
                    <td style="color:var(--primary);">${p.price} ر.س</td>
                    <td>${(p.price * p.stock).toLocaleString()} ر.س</td>
                    <td>${p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('ar-SA') : '—'}</td>
                    <td>
                        <input type="number" value="${p.stock}" style="width:70px; padding:6px; border-radius:4px; background:var(--bg); border:1px solid var(--border); color:var(--text);" onchange="quickUpdateStock('${p._id}', this.value)">
                    </td>
                </tr>
            `).join('');
        }
    } catch (e) { console.error(e); }
}

// ==================== نظام التحديثات الحية عبر WebSocket ====================
let adminWS = null;

function connectAdminWebSocket() {
    try {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        adminWS = new WebSocket(`${protocol}//${window.location.host}`);

        adminWS.onopen = () => {
            console.log('🔌 لوحة التحكم: WebSocket متصل');
            adminWS.send(JSON.stringify({ type: 'join', room: 'admin' }));
        };

        adminWS.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'newOrder') {
                    showToast(`🔔 طلب جديد: ${data.orderNumber} – ${data.total} ر.س`);
                    addNotification('طلب جديد', `تم إنشاء طلب ${data.orderNumber} بقيمة ${data.total} ر.س`, 'info');
                    if (currentTab === 'dashboard') loadDashboard();
                    if (currentTab === 'orders') loadOrders();
                } else if (data.type === 'newRFQ') {
                    showToast('💰 طلب تفاوض جديد');
                    addNotification('طلب تفاوض', 'طلب تفاوض جديد على منتج', 'warning');
                } else if (data.type === 'productUpdate') {
                    if (currentTab === 'products') loadProducts();
                } else if (data.type === 'orderStatusUpdate') {
                    showToast('📦 تم تحديث حالة طلب');
                } else if (data.type === 'chat message') {
                    if (currentTab === 'chat') {
                        const messages = document.getElementById('chatMessages');
                        if (messages) {
                            messages.innerHTML += `<div style="text-align:right; margin:10px 0;"><span style="background:var(--border); padding:10px 15px; border-radius:15px; display:inline-block;">${data.text}</span></div>`;
                            messages.scrollTop = messages.scrollHeight;
                        }
                    }
                }
            } catch (e) {}
        };

        adminWS.onclose = () => {
            console.log('🔌 لوحة التحكم: WebSocket منفصل – إعادة الاتصال خلال 5 ثوان');
            setTimeout(connectAdminWebSocket, 5000);
        };

        adminWS.onerror = () => {
            console.log('⚠️ خطأ في WebSocket');
        };
    } catch (e) {
        console.log('⚠️ WebSocket غير مدعوم');
    }
}

async function checkServerHealth() {
    const startTime = Date.now();
    try {
        const res = await fetch(`${API}/products?limit=1`);
        const responseTime = Date.now() - startTime;
        const data = await res.json();
        
        let status = '🟢 ممتاز';
        if (responseTime > 2000) status = '🟡 بطيء';
        if (responseTime > 5000 || !data.success) status = '🔴 يحتاج انتباه';
        
        return {
            status,
            responseTime,
            online: data.success || false
        };
    } catch (e) {
        return {
            status: '🔴 غير متصل',
            responseTime: 0,
            online: false
        };
    }
}

function checkSessionExpiry() {
    if (!adminToken) return;
    try {
        const payload = JSON.parse(atob(adminToken.split('.')[1]));
        const expiry = payload.exp * 1000;
        const now = Date.now();
        
        if (expiry - now < 3600000) { // أقل من ساعة
            showToast('⚠️ ستنتهي جلستك خلال ساعة – يرجى تجديد الدخول');
        }
        
        if (expiry < now) {
            alert('🔐 انتهت جلستك – يرجى إعادة تسجيل الدخول');
            localStorage.removeItem('adminToken');
            window.location.reload();
        }
    } catch (e) {}
}

function quickSearch(query) {
    if (!query || query.length < 2) return [];
    const results = [];
    
    allProductsCache.forEach(p => {
        if (p.name?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '📦 منتج', name: p.name, action: () => editProduct(p._id) });
        }
    });
    
    allOrdersCache.forEach(o => {
        if (o.orderNumber?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '📋 طلب', name: o.orderNumber, action: () => viewOrderDetail(o._id) });
        }
    });
    
    allCustomersCache.forEach(c => {
        if (c.fullName?.toLowerCase().includes(query.toLowerCase()) || c.email?.toLowerCase().includes(query.toLowerCase())) {
            results.push({ type: '👤 عميل', name: c.fullName, action: () => viewCustomerDetail(c._id) });
        }
    });
    
    return results.slice(0, 10);
}

function updateDailyStats(key, value) {
    const today = new Date().toISOString().split('T')[0];
    const stats = JSON.parse(localStorage.getItem('daily_stats') || '{}');
    if (!stats[today]) stats[today] = { orders: 0, revenue: 0, newCustomers: 0, productsAdded: 0 };
    stats[today][key] = (stats[today][key] || 0) + value;
    localStorage.setItem('daily_stats', JSON.stringify(stats));
}

// ==================== معالجة تغيير حجم النافذة ====================
window.addEventListener('resize', () => {
    const sidebar = document.getElementById('sidebar');
    if (window.innerWidth > 768) {
        sidebar.classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }
});
</script>
