<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الرعدي أونلاين | المتجر العالمي الأسطوري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tajawal', sans-serif; }
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --primary-light: #f39c12;
            --secondary: #1e293b;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
            --card: white;
            --border: #e2e8f0;
            --text: #0f172a;
        }
        body.dark-mode {
            --bg: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); transition: all 0.3s ease; overflow-x: hidden; }
        /* شريط الإعلانات المتحرك */
        .top-bar { background: linear-gradient(90deg, var(--dark), var(--secondary)); color: var(--primary-light); text-align: center; padding: 12px; font-size: 0.9rem; position: fixed; top: 0; width: 100%; z-index: 1000; overflow: hidden; white-space: nowrap; }
        .top-bar span { display: inline-block; animation: scrollText 25s linear infinite; font-weight: 600; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        /* الهيدر */
        .header { margin-top: 52px; background: var(--card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; position: sticky; top: 52px; z-index: 999; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .logo span { color: var(--text); background: none; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .lang-select, .currency-select { padding: 8px 15px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 600; cursor: pointer; }
        .search-box { background: var(--bg); border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; width: 280px; border: 1px solid var(--border); }
        .search-box input { background: none; border: none; outline: none; width: 100%; color: var(--text); }
        .user-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: var(--bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.2rem; }
        .icon-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); }
        .cart-icon { background: var(--primary); color: white; position: relative; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--danger); border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
        /* الأقسام */
        .categories-section { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 120px; z-index: 98; }
        .categories-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; flex-wrap: wrap; gap: 15px; }
        .categories { display: flex; gap: 25px; flex-wrap: wrap; }
        .category-item { font-weight: 700; cursor: pointer; padding: 8px 0; color: var(--gray); position: relative; transition: 0.3s; }
        .category-item.active, .category-item:hover { color: var(--primary); }
        .category-item.active::after { content: ''; position: absolute; bottom: 0; right: 0; width: 100%; height: 3px; background: var(--primary); }
        /* المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .product-card { background: var(--card); border-radius: 24px; overflow: hidden; transition: 0.4s; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.15); }
        .product-img { width: 100%; height: 260px; object-fit: cover; }
        .product-info { padding: 20px; }
        .product-title { font-weight: 800; font-size: 1.2rem; margin-bottom: 8px; }
        .product-category { font-size: 0.7rem; color: var(--primary); margin-bottom: 10px; font-weight: 600; }
        .product-rating { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        .stars { color: #fbbf24; font-size: 0.9rem; }
        .product-price { display: flex; align-items: baseline; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        .current-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .old-price { font-size: 0.85rem; color: var(--gray); text-decoration: line-through; }
        .discount-badge { background: var(--success); color: white; padding: 3px 10px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; }
        .flash-sale-timer { background: var(--danger); color: white; padding: 8px; text-align: center; border-radius: 12px; margin: 10px; font-weight: bold; }
        /* السلة الجانبية */
        .cart-sidebar { position: fixed; top: 0; right: -500px; width: 480px; height: 100%; background: var(--card); z-index: 1200; transition: 0.4s; padding: 25px; overflow-y: auto; border-left: 1px solid var(--border); }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .cart-timer { background: #fef3c7; color: #d97706; padding: 8px; border-radius: 12px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        /* نافذة تسجيل الدخول */
        .auth-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .auth-card { background: var(--card); width: 500px; max-width: 95%; border-radius: 45px; padding: 40px; position: relative; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid var(--border); border-radius: 50px; background: var(--bg); color: var(--text); }
        .auth-card button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 800; margin-top: 15px; cursor: pointer; }
        .auth-card .switch { text-align: center; margin-top: 20px; color: var(--primary); cursor: pointer; }
        /* الإشعارات */
        .toast { position: fixed; bottom: 30px; left: 30px; background: var(--card); padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 12px; z-index: 1100; transform: translateX(-150%); transition: 0.3s; border-right: 4px solid var(--primary); }
        .toast.show { transform: translateX(0); }
        .footer { background: var(--dark); color: #94a3b8; text-align: center; padding: 40px; margin-top: 60px; }
        @media (max-width: 768px) { .search-box { width: 100%; order: 3; } .cart-sidebar { width: 100%; right: -100%; } }
    </style>
</head>
<body>

<div class="top-bar"><span id="marqueeText">⚡ عروض الصيف تصل إلى 70% | كود WELCOME20 خصم 20% | شحن مجاني للطلبات فوق 300 ريال | خدمة العملاء على مدار الساعة ⚡</span></div>

<div class="header">
    <div class="logo" onclick="location.reload()">🦅 الرعدي <span id="logoText">أونلاين</span></div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="ابحث عن منتج..."></div>
    <div class="controls">
        <select id="langSelect" class="lang-select"><option value="ar">🇸🇦 العربية</option><option value="en">🇬🇧 English</option></select>
        <select id="currencySelect" class="currency-select"><option value="SAR">🇸🇦 ريال سعودي</option><option value="USD">🇺🇸 دولار أمريكي</option></select>
    </div>
    <div class="user-actions">
        <div class="icon-btn" id="darkModeBtn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></div>
        <div class="icon-btn" id="wishlistBtn" onclick="toggleWishlistModal()"><i class="fas fa-heart"></i></div>
        <div class="icon-btn cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></div>
        <button id="loginBtn" class="auth-btn" onclick="toggleAuthModal(true)">دخول</button>
        <button id="logoutBtn" class="auth-btn logout-btn" onclick="logout()" style="display:none;">خروج</button>
    </div>
</div>

<div class="categories-section"><div class="categories-container"><div class="categories" id="categoriesList"></div></div></div>

<div id="flashSaleTimer" class="flash-sale-timer" style="display:none;"></div>
<div class="products-grid" id="productsList"></div>

<!-- السلة الجانبية -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header"><h3 id="cartTitle">🛍️ سلة المشتريات</h3><i class="fas fa-times" onclick="toggleCart()"></i></div>
    <div id="cartTimer" class="cart-timer" style="display:none;"></div>
    <div id="cartItems"></div>
    <div class="coupon-input"><input type="text" id="couponCode" placeholder="رمز الخصم"><button onclick="applyCoupon()">تطبيق</button></div>
    <div id="cartTotal" class="cart-total"></div>
    <button onclick="openCheckoutModal()" style="width:100%; margin-top:15px;">✅ إتمام الطلب</button>
</div>

<!-- نافذة الطلب -->
<div id="checkoutModal" class="auth-modal-overlay">
    <div class="auth-card"><i class="fas fa-times close-modal" onclick="closeCheckoutModal()"></i><h3 id="checkoutTitle">📝 استكمال الطلب</h3>
        <input type="text" id="fullName" placeholder="الاسم الكامل"><input type="email" id="email" placeholder="البريد"><input type="tel" id="phone" placeholder="رقم الهاتف"><input type="text" id="address" placeholder="العنوان"><select id="country"><option value="saudi">🇸🇦 السعودية</option><option value="other">🌍 خارج المملكة</option></select>
        <div id="orderSummary"></div><button onclick="submitOrder()">💰 تأكيد الطلب</button>
    </div>
</div>

<!-- نافذة الأمنيات -->
<div id="wishlistModal" class="auth-modal-overlay" style="display:none;">
    <div class="auth-card"><i class="fas fa-times close-modal" onclick="closeWishlistModal()"></i><h3>❤️ قائمة أمنياتي</h3><div id="wishlistItems"></div></div>
</div>

<!-- نافذة تسجيل الدخول -->
<div id="authModal" class="auth-modal-overlay">
    <div class="auth-card"><i class="fas fa-times close-modal" onclick="toggleAuthModal(false)"></i>
        <div id="loginForm"><h2>🔐 دخول</h2><input type="email" id="loginEmail" placeholder="البريد"><input type="password" id="loginPassword" placeholder="كلمة المرور"><button onclick="login()">دخول</button><div class="switch" onclick="showRegister()">إنشاء حساب</div></div>
        <div id="registerForm" style="display:none;"><h2>📝 تسجيل</h2><input type="text" id="regName" placeholder="الاسم"><input type="email" id="regEmail" placeholder="البريد"><input type="password" id="regPassword" placeholder="كلمة المرور"><input type="tel" id="regPhone" placeholder="الجوال"><input type="text" id="regAddress" placeholder="العنوان"><button onclick="register()">تسجيل</button><div class="switch" onclick="showLogin()">عودة للدخول</div></div>
    </div>
</div>

<div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>
<div class="footer"><p id="footerText">© 2026 الرعدي أونلاين - تجربة تسوق فائقة وآمنة</p></div>

<script>
    // ==================== الترجمة والعملات ====================
    const translations = {
        ar: { siteName: "الرعدي أونلاين", cart: "سلة المشتريات", checkout: "إتمام الطلب", addToCart: "أضف للسلة", outOfStock: "غير متوفر", login: "دخول", logout: "خروج", register: "تسجيل", total: "الإجمالي", discount: "الخصم", shipping: "الشحن", apply: "تطبيق", close: "إغلاق", wishlist: "قائمة الأمنيات", flashSale: "🔥 عرض الخصم السريع ينتهي بعد", minute: "دقيقة", minutes: "دقائق", second: "ثانية", seconds: "ثواني" },
        en: { siteName: "Raadi Online", cart: "Shopping Cart", checkout: "Checkout", addToCart: "Add to Cart", outOfStock: "Out of Stock", login: "Login", logout: "Logout", register: "Register", total: "Total", discount: "Discount", shipping: "Shipping", apply: "Apply", close: "Close", wishlist: "Wishlist", flashSale: "🔥 Flash Sale ends in", minute: "minute", minutes: "minutes", second: "second", seconds: "seconds" }
    };
    let currentLang = localStorage.getItem('lang') || 'ar';
    let currentCurrency = localStorage.getItem('currency') || 'SAR';
    let exchangeRate = 3.75; // SAR to USD
    let products = [], cart = [], currentUser = null, couponDiscount = 0, activeCategory = 'all', shippingSettings = { domestic: 15, international: 50 };
    let wishlist = [], flashSaleEnd = Date.now() + 3600000; // ساعة واحدة
    
    // الأصوات
    const welcomeSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3'] });
    const addToCartSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/cart-drop-01.mp3'] });
    const orderSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/coins-2.mp3'] });
    const messageSound = new Howl({ src: ['https://www.soundjay.com/misc/sounds/notification-01.mp3'] });

    function applyTranslation() {
        document.getElementById('logoText').innerText = translations[currentLang].siteName;
        document.getElementById('cartTitle').innerText = translations[currentLang].cart;
        document.getElementById('checkoutTitle').innerText = translations[currentLang].checkout;
        document.querySelectorAll('.add-to-cart-text').forEach(el => el.innerText = translations[currentLang].addToCart);
        if (currentUser) document.getElementById('logoutBtn').innerText = translations[currentLang].logout;
        else document.getElementById('loginBtn').innerText = translations[currentLang].login;
    }

    function convertPrice(priceSAR) {
        if (currentCurrency === 'USD') return (priceSAR / exchangeRate).toFixed(2);
        return priceSAR;
    }
    function formatPrice(price) { return currentCurrency === 'USD' ? `$${price}` : `${price} ريال`; }

    // ==================== الأصوات الترحيبية ====================
    function playWelcome() { welcomeSound.play(); }
    function playAddToCart() { addToCartSound.play(); }
    function playOrder() { orderSound.play(); }
    function playMessage() { messageSound.play(); }

    // ==================== العداد التنازلي ====================
    let flashSaleInterval;
    function updateFlashSaleTimer() {
        const now = Date.now();
        const diff = flashSaleEnd - now;
        if (diff <= 0) { document.getElementById('flashSaleTimer').style.display = 'none'; clearInterval(flashSaleInterval); return; }
        const minutes = Math.floor(diff / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById('flashSaleTimer').innerHTML = `${translations[currentLang].flashSale} ${minutes} ${translations[currentLang].minutes} ${seconds} ${translations[currentLang].seconds}`;
        document.getElementById('flashSaleTimer').style.display = 'block';
    }

    // ==================== تحميل البيانات ====================
    async function loadProducts() {
        const res = await fetch(`/api/products?lang=${currentLang}`);
        products = await res.json();
        renderProducts();
        loadCategories();
    }
    async function loadCategories() {
        const res = await fetch(`/api/categories?lang=${currentLang}`);
        const cats = await res.json();
        document.getElementById('categoriesList').innerHTML = '<div class="category-item active" data-cat="all">' + (currentLang === 'ar' ? 'الكل' : 'All') + '</div>' + cats.map(c => `<div class="category-item" data-cat="${c.name}">${c.name}</div>`).join('');
        document.querySelectorAll('.category-item').forEach(el => el.addEventListener('click', () => { activeCategory = el.dataset.cat; renderProducts(); }));
    }
    async function loadSettings() {
        const res = await fetch('/api/settings');
        const s = await res.json();
        shippingSettings.domestic = parseFloat(s.domesticShipping?.[currentLang] || 15);
        shippingSettings.international = parseFloat(s.internationalShipping?.[currentLang] || 50);
    }
    async function loadWishlist() {
        if (!currentUser) return;
        const res = await fetch('/api/wishlist');
        wishlist = await res.json();
    }
    function renderProducts() {
        let filtered = products.filter(p => activeCategory === 'all' ? true : p.category === activeCategory);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
        const container = document.getElementById('productsList');
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center; padding:60px;">لا توجد منتجات</div>'; return; }
        container.innerHTML = filtered.map(p => {
            const price = convertPrice(p.price);
            const oldPrice = p.oldPrice ? convertPrice(p.oldPrice) : null;
            const inWishlist = wishlist.includes(p.id);
            return `<div class="product-card" onclick="location.href='/product?id=${p.id}'">
                <img src="${p.image}" class="product-img" onerror="this.src='https://picsum.photos/id/20/300/300'">
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-category">${p.category}</div>
                    <div class="product-rating"><div class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5 - Math.floor(p.rating))}</div><span>(${p.ratingCount})</span><i class="fas fa-star" style="color:var(--warning); cursor:pointer;" onclick="event.stopPropagation(); rateProduct(${p.id})"></i><i class="fas fa-heart ${inWishlist ? 'active' : ''}" style="color:${inWishlist ? 'red' : 'gray'}; cursor:pointer;" onclick="event.stopPropagation(); toggleWishlist(${p.id})"></i></div>
                    <div class="product-price"><span class="current-price">${formatPrice(price)}</span>${oldPrice ? `<span class="old-price">${formatPrice(oldPrice)}</span>` : ''}${p.discount ? `<span class="discount-badge">-${p.discount}%</span>` : ''}</div>
                    <div class="stock-status"><span class="${p.stock > 0 ? 'in-stock' : 'out-stock'}">${p.stock > 0 ? (currentLang === 'ar' ? 'متوفر' : 'In Stock') : (currentLang === 'ar' ? 'غير متوفر' : 'Out of Stock')}</span></div>
                    <div class="quantity-control"><button onclick="event.stopPropagation(); changeQty(${p.id}, -1)">-</button><span id="qty_${p.id}">1</span><button onclick="event.stopPropagation(); changeQty(${p.id}, 1)">+</button></div>
                    <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${p.id})"><span class="add-to-cart-text">${translations[currentLang].addToCart}</span> 🛒</button>
                </div>
            </div>`;
        }).join('');
    }

    function changeQty(id, delta) { const span = document.getElementById(`qty_${id}`); let val = Math.max(1, (quantities[id] || 1) + delta); span.innerText = val; quantities[id] = val; }
    async function addToCart(id) {
        if (!currentUser) { showToast(translations[currentLang].login + ' ' + (currentLang === 'ar' ? 'أولاً' : 'first'), true); toggleAuthModal(true); return; }
        const p = products.find(pr => pr.id === id);
        if (!p || p.stock <= 0) { showToast(translations[currentLang].outOfStock, true); return; }
        const qty = quantities[id] || 1;
        if (qty > p.stock) { showToast(`Only ${p.stock} left`, true); return; }
        const exist = cart.find(i => i.id === id);
        if (exist) exist.quantity += qty;
        else cart.push({ id, name: p.name, price: p.price, quantity: qty, image: p.image });
        saveCart(); updateCartUI(); playAddToCart(); showToast(translations[currentLang].addToCart + ' ' + (currentLang === 'ar' ? 'تمت الإضافة' : 'added'));
        await fetch('/api/reserve-stock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items: [{ id, quantity: qty }] }) });
    }

    let cartTimerInterval;
    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.quantity, 0);
        const container = document.getElementById('cartItems');
        if (cart.length === 0) { container.innerHTML = '<div style="text-align:center; padding:30px;">' + (currentLang === 'ar' ? 'السلة فارغة' : 'Cart is empty') + '</div>'; return; }
        let sub = 0;
        container.innerHTML = cart.map(i => { sub += i.price * i.quantity; return `<div class="cart-item"><div><strong>${i.name}</strong><br>${formatPrice(convertPrice(i.price))} × ${i.quantity}</div><div><button onclick="updateCartItem(${i.id}, -1)">-</button><span>${i.quantity}</span><button onclick="updateCartItem(${i.id}, 1)">+</button><button onclick="removeFromCart(${i.id})">🗑️</button></div></div>`; }).join('');
        const disc = sub * (couponDiscount / 100);
        const total = sub - disc;
        document.getElementById('cartTotal').innerHTML = `<div>${translations[currentLang].total}: ${formatPrice(convertPrice(total))}</div>`;
        startCartTimer();
    }
    function startCartTimer() {
        if (cartTimerInterval) clearInterval(cartTimerInterval);
        let timeLeft = 600; // 10 minutes
        const timerDiv = document.getElementById('cartTimer');
        timerDiv.style.display = 'block';
        cartTimerInterval = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(cartTimerInterval); timerDiv.style.display = 'none'; cart = []; saveCart(); updateCartUI(); showToast('Cart expired due to inactivity', true); }
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDiv.innerHTML = `⏰ ${translations[currentLang].cartReserve || 'حجز المنتجات'} ${mins}:${secs < 10 ? '0' : ''}${secs}`;
            timeLeft--;
        }, 1000);
    }

    async function submitOrder() {
        const name = document.getElementById('fullName').value, email = document.getElementById('email').value, phone = document.getElementById('phone').value, address = document.getElementById('address').value, country = document.getElementById('country').value;
        if (!name || !phone || !address) { showToast('Please fill all fields', true); return; }
        const sub = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        const disc = sub * (couponDiscount / 100);
        const ship = country === 'saudi' ? shippingSettings.domestic : shippingSettings.international;
        const total = sub - disc + ship;
        const order = { customer: name, email, phone, address, country, items: cart, subtotal: sub, discount: couponDiscount, discountAmount: disc, shipping: ship, total, currency: currentCurrency };
        const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(order) });
        const data = await res.json();
        if (data.success) { playOrder(); showToast('Order placed successfully!'); cart = []; couponDiscount = 0; saveCart(); updateCartUI(); closeCheckoutModal(); generateInvoice(order); } else showToast('Error placing order', true);
    }
    function generateInvoice(order) {
        const win = window.open();
        win.document.write(`<html dir="rtl"><head><title>Invoice</title><style>body{font-family:Arial;padding:30px;} .qr{padding:10px;}</style></head><body><div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(JSON.stringify(order))}"/></div><h1>فاتورة الرعدي أونلاين</h1><p>العميل: ${order.customer}</p><p>الهاتف: ${order.phone}</p><p>العنوان: ${order.address}</p><h3>الإجمالي: ${order.total} ${order.currency}</h3><button onclick="window.print()">طباعة</button><small>سياسة الاسترجاع 14 يوماً | © 2026 الرعدي أونلاين</small></body></html>`);
    }

    // ==================== التهيئة ====================
    document.getElementById('langSelect').value = currentLang;
    document.getElementById('currencySelect').value = currentCurrency;
    document.getElementById('langSelect').onchange = (e) => { currentLang = e.target.value; localStorage.setItem('lang', currentLang); applyTranslation(); loadProducts(); };
    document.getElementById('currencySelect').onchange = (e) => { currentCurrency = e.target.value; localStorage.setItem('currency', currentCurrency); renderProducts(); updateCartUI(); };
    if (localStorage.getItem('raadi_dark') === 'true') document.body.classList.add('dark-mode');
    playWelcome();
    loadSettings(); loadProducts(); updateFlashSaleTimer(); flashSaleInterval = setInterval(updateFlashSaleTimer, 1000);
    window.onload = () => { const savedUser = localStorage.getItem('raadi_user'); if (savedUser) { currentUser = JSON.parse(savedUser); updateAuthUI(); } };
</script>
</body>
</html>
