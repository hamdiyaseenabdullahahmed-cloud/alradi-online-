<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الرعدي أونلاين</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {margin:0;font-family:Tahoma,Arial;background:#f5f5f5;}
    header {
      background:#203a43;color:#fff;padding:10px;display:flex;justify-content:space-between;align-items:center;
      position:sticky;top:0;z-index:1000;
    }
    header img {height:40px;}
    .search {flex:1;margin:0 20px;}
    .search input {width:100%;padding:8px;border-radius:5px;border:none;}
    .icons span {margin:0 8px;cursor:pointer;}
    .hero {position:relative;height:250px;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;}
    .hero h2 {font-size:28px;color:gold;}
    .flash-sale {background:#ff4444;color:#fff;padding:15px;text-align:center;}
    .categories {display:flex;justify-content:center;flex-wrap:wrap;margin:20px 0;}
    .categories div {width:80px;height:80px;border-radius:50%;background:#203a43;color:#fff;display:flex;align-items:center;justify-content:center;margin:10px;cursor:pointer;}
    .products {display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;padding:20px;}
    .product-card {background:#fff;border-radius:8px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    .product-card img {width:100%;height:150px;object-fit:cover;border-radius:5px;}
    .product-card h3 {font-size:16px;margin:10px 0;}
    .product-card .price {color:#203a43;font-weight:bold;}
    .product-card button {width:100%;padding:8px;background:gold;border:none;border-radius:5px;cursor:pointer;}
    footer {background:#203a43;color:#fff;text-align:center;padding:15px;margin-top:20px;}
  </style>
</head>
<body>

  <!-- الشريط العلوي -->
  <header>
    <img src="logo.png" alt="شعار الرعدي">
    <div class="search"><input type="text" placeholder="ابحث عن منتج..."></div>
    <div class="icons">
      <span>🌐</span>
      <span>💱</span>
      <span>❤️</span>
      <span>🛒</span>
      <span>👤</span>
    </div>
  </header>

  <!-- سلايدر العروض -->
  <div class="hero">
    <h2>أقوى العروض والتخفيضات</h2>
  </div>

  <!-- العروض الخاطفة -->
  <div class="flash-sale">
    ⏳ عرض خاطف ينتهي خلال: <span id="countdown">00:10:00</span>
  </div>

  <!-- الأقسام -->
  <div class="categories">
    <div>📱 إلكترونيات</div>
    <div>👗 أزياء</div>
    <div>🌸 عطور</div>
    <div>🏠 منزل</div>
  </div>

  <!-- المنتجات -->
  <div class="products">
    <div class="product-card">
      <img src="product1.jpg" alt="منتج">
      <h3>هاتف ذكي فاخر</h3>
      <div class="price">999 ر.س <del>1200 ر.س</del></div>
      <button>إضافة إلى السلة</button>
    </div>
    <div class="product-card">
      <img src="product2.jpg" alt="منتج">
      <h3>عطر مميز</h3>
      <div class="price">250 ر.س <del>300 ر.س</del></div>
      <button>إضافة إلى السلة</button>
    </div>
    <!-- يمكنك تكرار المزيد من المنتجات هنا -->
  </div>

  <!-- الفوتر -->
  <footer>
    © 2026 الرعدي أونلاين - جميع الحقوق محفوظة
  </footer>

  <script>
    // عداد العرض الخاطف
    let time = 10*60; // 10 دقائق
    const countdown = document.getElementById("countdown");
    setInterval(()=>{
      let m = Math.floor(time/60);
      let s = time%60;
      countdown.textContent = `00:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
      if(time>0) time--;
    },1000);
  </script>

</body>
</html>
