<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦅 الرعدي أونلاين – تسوق الآن</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: #0F0F1A;
            color: #FFFFFF;
        }
        /* أنماط سريعة للمشاهدة */
        .header { background: #1A1A2E; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: #C9A84C; }
        .btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #C9A84C; color: #1A1A2E; }
        .btn-outline { background: transparent; border: 2px solid #C9A84C; color: #C9A84C; }
        .btn-danger { background: #E74C3C; color: white; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; }
        .product-card { background: #1A1A2E; border-radius: 16px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .product-image { height: 200px; background: #0F0F1A; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        .product-info { padding: 15px; }
        .product-name { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .product-price { color: #C9A84C; font-size: 18px; font-weight: bold; }
        .product-actions { display: flex; gap: 10px; margin-top: 15px; }
        .product-actions button { flex: 1; padding: 8px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 380px; height: 100vh; background: #1A1A2E; z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .cart-sidebar.open { right: 0; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1A1A2E; border-radius: 16px; padding: 30px; width: 90%; max-width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2A2A3E; background: #0F0F1A; color: white; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2ECC71; color: white; padding: 12px 24px; border-radius: 50px; z-index: 3000; animation: fadeInUp 0.3s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🦅 الرعدي أونلاين</div>
    <div>
        <button class="btn btn-outline" onclick="openCart()">🛒 السلة (<span id="cartCount">0</span>)</button>
        <button class="btn btn-primary" id="authBtn" onclick="openLoginModal()">👤 دخول / تسجيل</button>
    </div>
</div>

<div id="productsContainer" class="products">
    <div style="text-align: center; padding: 60px;">جاري تحميل المنتجات...</div>
</div>

<!-- السلة الجانبية -->
<div id="cartSidebar" class="cart-sidebar">
    <h3>🛒 سلة التسوق</h3>
    <button onclick="closeCart()" style="background: none; border: none; color: white; float: left; font-size: 20px;">✕</button>
    <div id="cartItems" style="margin-top: 50px;"></div>
    <div id="cartTotal" style="margin-top: 20px; font-size: 20px; font-weight: bold;"></div>
    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="checkout()">إتمام الشراء</button>
</div>

<!-- مودال تسجيل الدخول -->
<div id="loginModal" class="modal-overlay">
    <div class="modal">
        <h3 style="color: #C9A84C; margin-bottom: 20px;">🔐 تسجيل الدخول</h3>
        <div class="form-group"><input type="text" id="loginIdentifier" placeholder="البريد الإلكتروني أو رقم الجوال"></div>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">دخول</button>
        <hr style="margin: 15px 0; border-color: #2A2A3E;">
        <p style="text-align: center;">ليس لديك حساب؟ <a href="#" onclick="showRegister()" style="color: #C9A84C;">إنشاء حساب جديد</a></p>
    </div>
</div>

<!-- مودال تسجيل جديد -->
<div id="registerModal" class="modal-overlay">
    <div class="modal">
        <h3 style="color: #C9A84C; margin-bottom: 20px;">📝 إنشاء حساب جديد</h3>
        <div class="form-group"><input type="text" id="regFullName" placeholder="الاسم الكامل"></div>
        <div class="form-group"><input type="tel" id="regPhone" placeholder="رقم الجوال"></div>
        <div class="form-group"><input type="email" id="regEmail" placeholder="البريد الإلكتروني (اختياري)"></div>
        <div class="form-group"><input type="password" id="regPassword" placeholder="كلمة المرور"></div>
        <div class="form-group"><input type="password" id="regPasswordConfirm" placeholder="تأكيد كلمة المرور"></div>
        <button class="btn btn-primary" style="width: 100%;" onclick="register()">تسجيل</button>
        <hr style="margin: 15px 0; border-color: #2A2A3E;">
        <p style="text-align: center;">لديك حساب؟ <a href="#" onclick="showLogin()" style="color: #C9A84C;">تسجيل الدخول</a></p>
    </div>
</div>

<script>
    // ==================== المتغيرات ====================
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let products = [];

    // ==================== دوال مساعدة ====================
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.background = type === 'success' ? '#2ECC71' : '#E74C3C';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function updateAuthUI() {
        const btn = document.getElementById('authBtn');
        if (currentUser) {
            btn.innerHTML = `👤 ${currentUser.fullName.split(' ')[0]}`;
            btn.onclick = () => logout();
        } else {
            btn.innerHTML = '👤 دخول / تسجيل';
            btn.onclick = () => openLoginModal();
        }
    }

    function openLoginModal() {
        document.getElementById('loginModal').classList.add('active');
    }

    function openRegisterModal() {
        document.getElementById('registerModal').classList.add('active');
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    }

    function showRegister() {
        closeModals();
        openRegisterModal();
    }

    function showLogin() {
        closeModals();
        openLoginModal();
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        updateAuthUI();
        showToast('تم تسجيل الخروج بنجاح');
    }

    // ==================== المصادقة ====================
    async function login() {
        const identifier = document.getElementById('loginIdentifier').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!identifier || !password) {
            showToast('يرجى إدخال البريد/الجوال وكلمة المرور', 'error');
            return;
        }

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, password })
            });
            const data = await res.json();

            if (data.success) {
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                closeModals();
                updateAuthUI();
                showToast(`مرحباً ${currentUser.fullName}!`);
                
                if (currentUser.role === 'superadmin' || currentUser.role === 'admin') {
                    if (confirm('هل تريد الانتقال إلى لوحة التحكم؟')) {
                        window.location.href = '/admin';
                    }
                }
            } else {
                showToast(data.error || 'بيانات الدخول غير صحيحة', 'error');
            }
        } catch (error) {
            showToast('فشل الاتصال بالخادم', 'error');
        }
    }

    async function register() {
        const fullName = document.getElementById('regFullName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const passwordConfirm = document.getElementById('regPasswordConfirm').value;

        if (!fullName || !phone || !password) {
            showToast('الاسم الكامل ورقم الجوال وكلمة المرور مطلوبة', 'error');
            return;
        }

        if (password !== passwordConfirm) {
            showToast('كلمتا المرور غير متطابقتين', 'error');
            return;
        }

        if (password.length < 6) {
            showToast('كلمة المرور يجب أن تكون 6 خانات على الأقل', 'error');
            return;
        }

        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, phone, email, password, country: 'السعودية', city: 'الرياض' })
            });
            const data = await res.json();

            if (data.success) {
                token = data.token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(currentUser));
                closeModals();
                updateAuthUI();
                showToast('تم إنشاء الحساب بنجاح!');
            } else {
                showToast(data.error || 'فشل إنشاء الحساب', 'error');
            }
        } catch (error) {
            showToast('فشل الاتصال بالخادم', 'error');
        }
    }

    // ==================== المنتجات ====================
    async function loadProducts() {
        try {
            const res = await fetch(`${API}/products?limit=50`);
            const data = await res.json();
            if (data.success && data.data.length) {
                products = data.data;
                renderProducts(products);
            } else {
                // منتجات تجريبية إذا لم تكن هناك منتجات
                const demoProducts = [
                    { _id: '1', name: '📱 ساعة ذكية', price: 599, category: 'إلكترونيات', stock: 50, image: '🕐' },
                    { _id: '2', name: '🎧 سماعات لاسلكية', price: 349, category: 'إلكترونيات', stock: 100, image: '🎧' },
                    { _id: '3', name: '🧴 عطر فاخر', price: 450, category: 'عطور', stock: 30, image: '🧴' },
                    { _id: '4', name: '👜 حقيبة يد', price: 799, category: 'أزياء', stock: 15, image: '👜' },
                    { _id: '5', name: '📱 هاتف ذكي', price: 2999, category: 'إلكترونيات', stock: 12, image: '📱' }
                ];
                products = demoProducts;
                renderProducts(products);
            }
        } catch (error) {
            console.error('خطأ:', error);
            // منتجات تجريبية للعرض
            products = [
                { _id: '1', name: '📱 ساعة ذكية', price: 599, stock: 50, image: '🕐' },
                { _id: '2', name: '🎧 سماعات لاسلكية', price: 349, stock: 100, image: '🎧' },
                { _id: '3', name: '🧴 عطر فاخر', price: 450, stock: 30, image: '🧴' }
            ];
            renderProducts(products);
        }
    }

    function renderProducts(productsList) {
        const container = document.getElementById('productsContainer');
        container.innerHTML = productsList.map(p => `
            <div class="product-card">
                <div class="product-image">${p.image || '📦'}</div>
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toFixed(2)} ر.س</div>
                    <div class="product-actions">
                        <button onclick="addToCart('${p._id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})">🛒 أضف للسلة</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ==================== السلة ====================
    function addToCart(id, name, price) {
        const existing = cart.find(i => i.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        showToast(`تم إضافة ${name} إلى السلة`);
    }

    function updateCartCount() {
        const count = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('cartCount').textContent = count;
    }

    function openCart() {
        renderCart();
        document.getElementById('cartSidebar').classList.add('open');
    }

    function closeCart() {
        document.getElementById('cartSidebar').classList.remove('open');
    }

    function renderCart() {
        const container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #A0A0B0;">السلة فارغة</p>';
            document.getElementById('cartTotal').innerHTML = '';
            return;
        }

        let total = 0;
        container.innerHTML = cart.map((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            return `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #2A2A3E;">
                    <div>
                        <div style="font-weight: bold;">${item.name}</div>
                        <div style="color: #C9A84C;">${item.price} ر.س</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button onclick="updateQuantity(${index}, -1)" style="width: 30px; height: 30px; border-radius: 50%; border: none; background: #2A2A3E; color: white;">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateQuantity(${index}, 1)" style="width: 30px; height: 30px; border-radius: 50%; border: none; background: #2A2A3E; color: white;">+</button>
                        <button onclick="removeFromCart(${index})" style="background: none; border: none; color: #E74C3C; font-size: 20px;">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `الإجمالي: ${total.toFixed(2)} ر.س`;
    }

    function updateQuantity(index, delta) {
        const newQty = cart[index].quantity + delta;
        if (newQty < 1) {
            cart.splice(index, 1);
        } else {
            cart[index].quantity = newQty;
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
    }

    function checkout() {
        if (!token) {
            closeCart();
            openLoginModal();
            showToast('يرجى تسجيل الدخول أولاً', 'error');
            return;
        }
        if (cart.length === 0) {
            showToast('السلة فارغة', 'error');
            return;
        }
        showToast('جاري معالجة الطلب...');
        // محاكاة إنشاء طلب
        setTimeout(() => {
            showToast('تم إنشاء الطلب بنجاح! شكراً لتسوقك معنا');
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            closeCart();
        }, 1500);
    }

    // ==================== بدء التشغيل ====================
    loadProducts();
    updateCartCount();
    updateAuthUI();
</script>
</body>
</html>
