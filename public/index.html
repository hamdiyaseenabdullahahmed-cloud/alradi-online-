<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الرعدي اون لاين | بوابتك الفاخرة</title>
    <!-- استدعاء خط القاهرة والأيقونات الاحترافية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark-blue: #0b1a30;
            --card-blue: #0f2442;
            --gold-primary: #caa135;
            --gold-hover: #b08a27;
            --text-light: #ffffff;
            --text-muted: #a0aec0;
            --input-border: #1e3a5f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark-blue);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* الزخرفة الإسلامية الخلفية الشفافة */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            opacity: 0.04;
            pointer-events: none;
            top: 0; left: 0;
        }

        /* شريط اختيار العملة العلوي */
        .top-currency-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid var(--input-border);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }

        .top-currency-bar select {
            background: transparent;
            color: var(--text-light);
            border: none;
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 10;
        }

        .auth-card {
            text-align: center;
        }

        .brand-logo {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
            background: linear-gradient(135deg, #1e3a5f, #0b1a30);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 0 25px rgba(202, 161, 53, 0.25);
        }

        .brand-logo i {
            font-size: 50px;
            color: var(--gold-primary);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold-primary);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        /* حقول الإدخال */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(15, 36, 66, 0.7);
            border: 1px solid var(--input-border);
            border-radius: 25px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: right;
        }

        .input-wrapper input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(202, 161, 53, 0.2);
        }

        .input-wrapper i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            font-size: 16px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .forgot-pass-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-pass-link:hover {
            color: var(--gold-primary);
        }

        /* الأزرار الفخمة */
        .btn-gold-solid {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--gold-hover), var(--gold-primary));
            border: none;
            border-radius: 25px;
            color: #050d1a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(202, 161, 53, 0.3);
            margin-bottom: 15px;
        }

        .btn-gold-solid:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(202, 161, 53, 0.4);
        }

        .btn-outline-gold {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1.5px solid var(--gold-primary);
            border-radius: 25px;
            color: var(--text-light);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline-gold:hover {
            background: rgba(202, 161, 53, 0.1);
        }

        .hidden-pane {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="top-currency-bar">
        <i class="fa-solid fa-money-bill-wave" style="color: var(--gold-primary);"></i>
        <select id="currency-select">
            <option value="SAR">الريال السعودي (ر.س)</option>
            <option value="YER">الريال اليمني (ر.ي)</option>
        </select>
    </div>

    <div class="auth-wrapper">
        <!-- نموذج تسجيل الدخول -->
        <div class="auth-card" id="login-pane">
            <div class="brand-logo">
                <i class="fa-solid fa-dove"></i>
            </div>
            <h1 class="brand-title">مَتْجَر الرَّعْدِي اِؤْن لَايِنْ</h1>
            <p class="brand-subtitle">بوابتك الرقمية لعالم من الفخامة والتميز</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="login-user" required placeholder="اسم المستخدم أو رقم الهاتف">
                </div>

                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" required placeholder="كلمة المرور الشخصية">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> تذكر بياناتي
                    </label>
                    <a href="#" class="forgot-pass-link">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn-gold-solid">تسجيل الدخول</button>
                <button type="button" class="btn-outline-gold" onclick="toggleView('reg')">إنشاء حساب جديد</button>
            </form>
        </div>

        <!-- نموذج إنشاء حساب جديد -->
        <div class="auth-card hidden-pane" id="register-pane">
            <div class="brand-logo">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="brand-title">عضوية جديدة</h1>
            <p class="brand-subtitle">انضم إلى عملاء متجر الرعدي المميزين</p>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="reg-name" required placeholder="الاسم الكامل للعميل">
                </div>

                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="reg-phone" required placeholder="رقم الهاتف (مع رمز الدولة)">
                </div>

                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-pass" required placeholder="تعيين كلمة مرور قوية">
                </div>

                <button type="submit" class="btn-gold-solid">تأكيد الحساب والانطلاق</button>
                <button type="button" class="btn-outline-gold" onclick="toggleView('login')">العودة لتسجيل الدخول</button>
            </form>
        </div>
    </div>

    <!-- استدعاء ملفات الـ JS التابعة لك من مجلداتك الموضحة بالصور -->
    <script src="js/core.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleView(pane) {
            if(pane === 'reg') {
                document.getElementById('login-pane').classList.add('hidden-pane');
                document.getElementById('register-pane').classList.remove('hidden-pane');
            } else {
                document.getElementById('register-pane').classList.add('hidden-pane');
                document.getElementById('login-pane').classList.remove('hidden-pane');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            alert("جارٍ تشغيل محرك الخلفية وسيرفر رندر للتحقق ودخول متجر الرعدي!");
        }

        function handleRegister(e) {
            e.preventDefault();
            alert("تم إرسال طلب تسجيل العميل الجديد بنجاح!");
            toggleView('login');
        }
    </script>
</body>
</html>
