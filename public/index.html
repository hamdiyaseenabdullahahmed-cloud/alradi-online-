<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق الرعدي أونلاين - بوابة الدخول الفخمة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0d0f12;
            --card-dark: #14181f;
            --gold-primary: #caa135;
            --gold-hover: #b08a27;
            --text-light: #ffffff;
            --text-muted: #a0aec0;
            --input-bg: #1c232e;
            --border-color: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* حاوية الكرت الرئيسي */
        .auth-container {
            background-color: var(--card-dark);
            border: 1px solid rgba(202, 161, 53, 0.2);
            border-radius: 15px;
            padding: 35px 25px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(202, 161, 53, 0.05);
            text-align: center;
            position: relative;
        }

        /* تصميم شعار الصقر الفخم */
        .logo-area {
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 50px;
            color: var(--gold-primary);
            filter: drop-shadow(0 0 8px rgba(202, 161, 53, 0.4));
            margin-bottom: 10px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--gold-primary);
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* مجموعات الإدخال والنموذج */
        .form-group {
            margin-bottom: 20px;
            text-align: right;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-right: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(202, 161, 53, 0.15);
        }

        /* زر الرؤية لكلمة المرور */
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }

        .toggle-password:hover {
            color: var(--gold-primary);
        }

        /* أزرار الفخامة */
        .btn-gold {
            width: 100%;
            padding: 14px;
            background-color: var(--gold-primary);
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-gold:hover {
            background-color: var(--gold-hover);
            box-shadow: 0 5px 15px rgba(202, 161, 53, 0.3);
            transform: translateY(-1px);
        }

        /* روابط التبديل السفلى */
        .switch-form-text {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-link {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
        }

        .switch-link:hover {
            text-decoration: underline;
            color: var(--gold-hover);
        }

        /* إخفاء الشاشات برمجياً بالتناوب */
        .hidden-form {
            display: none !important;
        }

        /* تنبيهات النظام */
        .alert-box {
            background-color: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #ff6b6b;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fa-solid fa-crow"></i> </div>
            <h1>الرعدي أونلاين</h1>
            <div class="subtitle" id="dynamic-subtitle">بوابتك لعالم التسوق الدولي الفاخر</div>
        </div>

        <div class="alert-box" id="alertLog"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني أو رقم الهاتف</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="loginUser" placeholder="9665xxxxxxxx أو example@gmail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassVisibility('loginPass', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn-gold">
                <span>دخول إلى عالم الفخامة</span>
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <p class="switch-form-text">
                ليس لديك حساب؟ 
                <span class="switch-link" onclick="showRegisterForm()">أنشئ حساباً جديداً الآن</span>
            </p>
        </form>

        <form id="registerForm" class="hidden-form">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="regName" placeholder="اكتب اسمك الثلاثي" required>
                </div>
            </div>

            <div class="form-group">
                <label>رقم الهاتف (مع رمز الدولة)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="regPhone" placeholder="9665xxxxxxxx" required>
                </div>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني (اختياري)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPass" placeholder="اختر كلمة مرور قوية" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassVisibility('regPass', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn-gold">
                <span>إنشاء الحساب والانطلاق</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>

            <p class="switch-form-text">
                لديك حساب بالفعل؟ 
                <span class="switch-link" onclick="showLoginForm()">تسجيل الدخول</span>
            </p>
        </form>

    </div>

    <script>
        // إظهار وإخفاء كلمة المرور عند النقر على العين
        function togglePassVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // التبديل إلى شاشة إنشاء الحساب
        function showRegisterForm() {
            document.getElementById("loginForm").classList.add("hidden-form");
            document.getElementById("registerForm").classList.remove("hidden-form");
            document.getElementById("dynamic-subtitle").innerText = "انضم إلينا لتبدأ رحلة التسوق الفاخرة";
            document.getElementById("alertLog").style.display = "none";
        }

        // التبديل إلى شاشة تسجيل الدخول
        function showLoginForm() {
            document.getElementById("registerForm").classList.add("hidden-form");
            document.getElementById("loginForm").classList.remove("hidden-form");
            document.getElementById("dynamic-subtitle").innerText = "بوابتك لعالم التسوق الدولي الفاخر";
            document.getElementById("alertLog").style.display = "none";
        }

        // معالجة الضغط على زر تسجيل الدخول
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            const alertBox = document.getElementById("alertLog");

            // محاكاة برمجية دفاعية ذكية للدخول المؤقت حتى تجهيز الـ Database بالكامل
            if(user && pass) {
                alertBox.style.backgroundColor = "rgba(40, 167, 69, 0.1)";
                alertBox.style.borderColor = "#28a745";
                alertBox.style.color = "#2ecc71";
                alertBox.innerText = "⏳ جاري التحقق والدخول لعالم الفخامة...";
                alertBox.style.display = "block";
                
                setTimeout(() => {
                    // تحويل المستخدم لصفحة المتجر الرئيسية (يمكنك تبديلها لأي مسار لاحقاً)
                    window.location.href = "/api/health"; 
                }, 1500);
            }
        });

        // معالجة الضغط على زر إنشاء حساب جديد
        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const name = document.getElementById("regName").value;
            const phone = document.getElementById("regPhone").value;
            const alertBox = document.getElementById("alertLog");

            if(name && phone) {
                alertBox.style.backgroundColor = "rgba(40, 167, 69, 0.1)";
                alertBox.style.borderColor = "#28a745";
                alertBox.style.color = "#2ecc71";
                alertBox.innerText = `🟢 أهلاً بك يا ${name}، تم إنشاء حسابك بنجاح! جاري تحويلك...`;
                alertBox.style.display = "block";

                setTimeout(() => {
                    showLoginForm();
                }, 2000);
            }
        });
    </script>
</body>
</html>
