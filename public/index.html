<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ الرعدي أونلاين - المتجر الفاخر</title>
    <style>
        /* نفس التنسيقات السابقة ولكن مع تحسينات وإضافات للصوتيات */
        :root { --primary: #C9A84C; --secondary: #1A1A2E; --bg: #0F0F1A; --card: #1A1A2E; --text: #FFFFFF; --muted: #A0A0B0; --border: #2A2A3E; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Tahoma,sans-serif; background:var(--bg); color:var(--text); }
        .container { max-width:1400px; margin:auto; padding:0 20px; }
        header { backdrop-filter:blur(20px); background:rgba(15,15,26,0.9); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .header-inner { display:flex; align-items:center; justify-content:space-between; padding:12px 0; }
        .logo { font-size:26px; font-weight:900; color:var(--primary); text-decoration:none; }
        .search-bar { flex:1; max-width:500px; margin:0 20px; position:relative; }
        .search-bar input { width:100%; padding:12px 40px 12px 20px; border-radius:50px; background:var(--card); border:1px solid var(--border); color:var(--text); }
        .header-actions { display:flex; gap:20px; }
        .header-btn { background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; position:relative; }
        .header-btn:hover { color:var(--primary); }
        .cart-count { position:absolute; top:-5px; right:-10px; background:var(--primary); color:#000; border-radius:50%; width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center; }
        .categories-scroll { display:flex; gap:15px; overflow-x:auto; padding:20px 0; }
        .category-item { flex:0 0 auto; background:var(--card); border-radius:16px; padding:20px 25px; text-align:center; cursor:pointer; border:1px solid transparent; transition:0.3s; }
        .category-item:hover,.category-item.active { border-color:var(--primary); background:rgba(201,168,76,0.1); }
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:20px; margin-top:20px; }
        .product-card { background:var(--card); border-radius:16px; overflow:hidden; transition:0.3s; cursor:pointer; position:relative; }
        .product-card:hover { transform:translateY(-5px); border:1px solid var(--primary); }
        .product-img { width:100%; aspect-ratio:1; object-fit:cover; }
        .product-info { padding:15px; }
        .product-name { font-weight:bold; }
        .price { display:flex; align-items:baseline; gap:10px; }
        .current-price { font-size:20px; font-weight:bold; color:var(--primary); }
        .old-price { font-size:14px; color:var(--muted); text-decoration:line-through; }
        .badge { position:absolute; top:10px; right:10px; padding:4px 10px; border-radius:20px; font-size:12px; }
        .badge-sale { background:#E74C3C; }
        .badge-out { background:#E74C3C; color:white; }
        .modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1000; }
        .modal.active { display:flex; }
        .modal-content { background:var(--card); border-radius:16px; padding:30px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; position:relative; }
        .modal-close { position:absolute; top:15px; left:15px; background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; }
        .btn { display:inline-block; padding:12px 30px; border-radius:50px; border:none; font-weight:bold; cursor:pointer; transition:0.2s; }
        .btn-primary { background:var(--primary); color:#000; }
        .btn-primary:hover { background:#b08a3e; }
        .btn-block { width:100%; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px; color:var(--muted); }
        .form-group input,.form-group select { width:100%; padding:12px; border-radius:8px; background:var(--bg); border:1px solid var(--border); color:var(--text); }
        /* عناصر الصوت المخفية */
        .sound-effect { display:none; }
    </style>
</head>
<body>
    <!-- عناصر الصوت -->
    <audio id="sound-add-to-cart" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-remove" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-success" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-error" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-welcome" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-print" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-save" preload="auto" src="data:audio/mpeg;base64,..."></audio>
    <audio id="sound-logout" preload="auto" src="data:audio/mpeg;base64,..."></audio>

    <header>
        <div class="container header-inner">
            <a href="/" class="logo">⚡ الرعدي أونلاين</a>
            <div class="search-bar"><input type="text" id="searchInput" placeholder="ابحث عن منتج..." oninput="handleSearch()"></div>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleLang()">🌐</button>
                <button class="header-btn" onclick="toggleCurrency()">💱</button>
                <button class="header-btn" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></button>
                <button class="header-btn" id="userBtn" onclick="handleUser()">👤</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="categories-scroll" id="categoryList">
            <div class="category-item active" onclick="filterCategory('all')">الكل</div>
            <div class="category-item" onclick="filterCategory('إلكترونيات')">إلكترونيات</div>
            <div class="category-item" onclick="filterCategory('أزياء')">أزياء</div>
            <div class="category-item" onclick="filterCategory('عطور')">عطور</div>
            <div class="category-item" onclick="filterCategory('منزل')">منزل</div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
        <button id="loadMore" class="btn btn-secondary" style="display:none;margin:20px auto;" onclick="loadMore()">تحميل المزيد</button>
    </main>

    <!-- مودال تسجيل الدخول -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('authModal')">✕</button>
            <h2 id="authTitle">تسجيل الدخول</h2>
            <div id="loginForm">
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="loginEmail"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="loginPassword"></div>
                <button class="btn btn-primary btn-block" onclick="login()">دخول</button>
                <p style="margin-top:10px;"><a href="#" onclick="showRegister()">إنشاء حساب</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group"><label>الاسم الرباعي</label><input type="text" id="regName"></div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="regEmail"></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="regPhone"></div>
                <div class="form-group"><label>كلمة المرور</label><input type="password" id="regPassword"></div>
                <button class="btn btn-primary btn-block" onclick="register()">تسجيل</button>
            </div>
        </div>
    </div>

    <!-- مودال السلة -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('cartModal')">✕</button>
            <h2>🛒 سلة التسوق</h2>
            <div id="cartItems"></div>
            <div class="cart-summary">
                <div class="summary-row"><span>المجموع</span><span id="cartSubtotal"></span></div>
                <div class="summary-row"><span>خصم الولاء</span><span id="cartLoyalty"></span></div>
                <div class="summary-total"><span>الإجمالي</span><span id="cartTotal"></span></div>
            </div>
            <button class="btn btn-primary btn-block" onclick="checkout()">💳 إتمام الشراء</button>
        </div>
    </div>

    <!-- مودال الفاتورة -->
    <div class="modal" id="invoiceModal">
        <div class="modal-content" style="max-width:700px;background:white;color:#000;">
            <button class="modal-close" onclick="closeModal('invoiceModal')">✕</button>
            <div id="invoiceContent"></div>
            <button class="btn btn-primary" onclick="printInvoice()">🖨️ طباعة</button>
            <button class="btn btn-secondary" onclick="downloadInvoice()">💾 حفظ PDF</button>
        </div>
    </div>

    <script>
        const API = '/api';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || 'null');
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCategory = 'all';
        let currentPage = 1;

        // دوال الصوت
        function playSound(id) {
            const audio = document.getElementById(id);
            if (audio) { audio.currentTime = 0; audio.play().catch(()=>{}); }
        }

        // تحميل المنتجات
        async function loadProducts(page = 1, append = false) {
            let url = `${API}/products?page=${page}&limit=12`;
            if (currentCategory !== 'all') url += `&category=${currentCategory}`;
            if (document.getElementById('searchInput').value) url += `&search=${document.getElementById('searchInput').value}`;
            const res = await fetch(url);
            const data = await res.json();
            const grid = document.getElementById('productsGrid');
            if (!append) grid.innerHTML = '';
            data.data.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div style="position:relative;">
                        <img src="${p.images?.[0]?.url || 'https://placehold.co/400'}" class="product-img">
                        ${p.discount > 0 ? '<span class="badge badge-sale">-' + p.discount + '%</span>' : ''}
                        ${p.stock === 0 ? '<span class="badge badge-out">نفذ</span>' : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="price">
                            <span class="current-price">${p.price} ر.س</span>
                            ${p.comparePrice ? `<span class="old-price">${p.comparePrice} ر.س</span>` : ''}
                        </div>
                        <button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="event.stopPropagation();addToCart('${p._id}')">أضف للسلة</button>
                    </div>
                `;
                card.addEventListener('click', () => openProduct(p._id));
                grid.appendChild(card);
            });
            document.getElementById('loadMore').style.display = (data.pagination.total > page * 12) ? 'block' : 'none';
            currentPage = page;
        }

        function loadMore() { loadProducts(currentPage + 1, true); }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            loadProducts(1);
        }

        function handleSearch() { loadProducts(1); }

        // السلة
        function addToCart(productId) {
            playSound('sound-add-to-cart');
            const exist = cart.find(i => i.productId === productId);
            if (exist) exist.quantity++;
            else cart.push({ productId, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            // جلب اسم المنتج والسعر (اختياري)
            fetch(`${API}/products/${productId}`).then(r=>r.json()).then(d=>{
                if(d.success){
                    const item = cart.find(i=>i.productId === productId);
                    if(item) { item.name = d.data.name; item.price = d.data.price; item.image = d.data.images?.[0]?.url; localStorage.setItem('cart', JSON.stringify(cart)); }
                }
            });
        }

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.reduce((s,i) => s + i.quantity, 0);
        }

        function openCart() {
            const itemsDiv = document.getElementById('cartItems');
            itemsDiv.innerHTML = cart.map((item, idx) => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span>${item.name || 'منتج'} (${item.quantity})</span>
                    <button class="btn btn-sm" style="background:#E74C3C;color:white;" onclick="removeFromCart(${idx})">✕</button>
                </div>
            `).join('');
            updateCartTotals();
            document.getElementById('cartModal').classList.add('active');
        }

        function removeFromCart(index) {
            playSound('sound-remove');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            openCart();
        }

        function updateCartTotals() {
            const subtotal = cart.reduce((s,i) => s + ((i.price||0) * i.quantity), 0);
            document.getElementById('cartSubtotal').textContent = subtotal.toFixed(2) + ' ر.س';
            // خصم الولاء
            let loyaltyDisc = 0;
            if (user && user.loyaltyPoints) {
                const tier = getTierFromPoints(user.loyaltyPoints);
                loyaltyDisc = subtotal * (tier.discount / 100);
                document.getElementById('cartLoyalty').textContent = '-' + loyaltyDisc.toFixed(2) + ' ر.س';
            }
            document.getElementById('cartTotal').textContent = (subtotal - loyaltyDisc).toFixed(2) + ' ر.س';
        }

        function getTierFromPoints(points) {
            if (points >= 2000) return { name: 'بلاتيني', discount: 15 };
            if (points >= 1000) return { name: 'ذهبي', discount: 10 };
            if (points >= 500) return { name: 'فضي', discount: 5 };
            return { name: 'برونزي', discount: 0 };
        }

        async function checkout() {
            if (!token) return alert('يرجى تسجيل الدخول');
            const res = await fetch(`${API}/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ items: cart, shippingAddress: 'الرياض', shippingType: 'internal' })
            });
            const data = await res.json();
            if (data.success) {
                playSound('sound-success');
                showInvoice(data.data);
                cart = []; localStorage.setItem('cart', '[]'); updateCartCount(); closeModal('cartModal');
            } else alert(data.error);
        }

        function showInvoice(order) {
            document.getElementById('invoiceContent').innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <h2>الرعدي أونلاين</h2>
                    <p>فاتورة رقم ${order.orderNumber}</p>
                </div>
                <hr>
                <p>الإجمالي: ${order.total} ر.س</p>
                <p>نقاط مكتسبة: ${order.pointsEarned}</p>
                <canvas id="signatureCanvas" width="300" height="100" style="border:1px dashed #ccc; margin-top:20px;"></canvas>
                <p style="margin-top:10px;">شروط الاسترجاع: خلال 14 يوم</p>
            `;
            document.getElementById('invoiceModal').classList.add('active');
        }

        function printInvoice() { playSound('sound-print'); window.print(); }
        function downloadInvoice() { playSound('sound-save'); alert('تم حفظ الفاتورة (محاكاة)'); }

        // المصادقة
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('authTitle').textContent = 'إنشاء حساب';
        }
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
            const data = await res.json();
            if (data.success) {
                token = data.token; user = data.user;
                localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user));
                updateUserUI(); closeModal('authModal');
                playSound('sound-welcome');
            } else { alert(data.error); playSound('sound-error'); }
        }
        async function register() {
            const body = {
                fullName: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value || '966',
                password: document.getElementById('regPassword').value
            };
            const res = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            const data = await res.json();
            if (data.success) {
                token = data.token; user = data.user;
                localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user));
                updateUserUI(); closeModal('authModal');
                playSound('sound-welcome');
            } else alert(data.error);
        }
        function handleUser() {
            if (user) {
                if (confirm('تسجيل خروج؟')) {
                    playSound('sound-logout');
                    token = null; user = null; localStorage.clear();
                    updateUserUI(); cart = []; updateCartCount();
                }
            } else document.getElementById('authModal').classList.add('active');
        }
        function updateUserUI() { document.getElementById('userBtn').textContent = user ? '👤✅' : '👤'; }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // اللغة والعملة
        function toggleLang() { alert('تغيير اللغة (قيد التطوير)'); }
        function toggleCurrency() { alert('تغيير العملة (قيد التطوير)'); }

        // بدء التطبيق
        loadProducts(1);
        updateCartCount();
        updateUserUI();
    </script>
</body>
</html>
