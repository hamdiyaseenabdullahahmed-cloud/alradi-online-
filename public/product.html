<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تفاصيل المنتج — الرعدي بلاس</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="brand">
      <img src="/assets/logo.png" alt="logo" class="logo-img" />
      <div>
        <h1>الرعدي بلاس</h1>
        <p class="tag">تفاصيل المنتج</p>
      </div>
    </div>
    <div class="header-actions">
      <button onclick="location.href='/'" class="btn secondary">الرئيسية</button>
      <button onclick="location.href='/checkout.html'" class="btn">السلة</button>
    </div>
  </header>

  <!-- Product Details -->
  <main class="container">
    <section id="productWrap" class="section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
        <div>
          <img id="prodImg" src="/assets/product-placeholder.jpg" alt="product" style="width:100%;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
        </div>
        <div>
          <h2 id="prodName">اسم المنتج</h2>
          <p id="prodDesc" style="color:#6b7280">وصف المنتج</p>
          <div style="margin:12px 0;font-weight:700;font-size:18px" id="prodPrice">0 ر.س</div>
          <div style="display:flex;gap:10px">
            <button class="btn primary" onclick="addToCartFromProduct()">أضف للسلة</button>
            <button class="btn secondary" onclick="location.href='/checkout.html'">الدفع الآن</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">© 2026 الرعدي أونلاين - جميع الحقوق محفوظة</footer>

  <!-- Script -->
  <script>
    function getQuery(name){
      const url = new URL(location.href);
      return url.searchParams.get(name);
    }
    async function loadProduct(){
      const id = getQuery('id');
      try{
        const res = await fetch('/api/products');
        const items = await res.json();
        const p = items.find(x => String(x.id) === String(id)) || items[0] || {name:'منتج تجريبي', price:0, image:'/assets/product-placeholder.jpg', description:'وصف تجريبي'};
        document.getElementById('prodImg').src = p.image;
        document.getElementById('prodName').textContent = p.name;
        document.getElementById('prodDesc').textContent = p.description;
        document.getElementById('prodPrice').textContent = Number(p.price).toFixed(2) + ' ر.س';
      }catch(e){
        console.error('فشل تحميل المنتج', e);
      }
    }
    function addToCartFromProduct(){
      const id = getQuery('id');
      let cart = JSON.parse(localStorage.getItem('cart_v1') || '[]');
      const found = cart.find(i=>String(i.id)===String(id));
      if(found) found.qty++;
      else cart.push({id, qty:1});
      localStorage.setItem('cart_v1', JSON.stringify(cart));
      alert('تمت إضافة المنتج إلى السلة');
    }
    loadProduct();
  </script>
</body>
</html>
