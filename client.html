<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الرعدي أونلاين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', system-ui; }
        body {
            background: linear-gradient(135deg, #0f1724, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { color: #b87333; margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-size: 1rem;
        }
        button {
            background: #b87333;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 30px;
            margin: 15px 0;
            display: none;
        }
        .tab {
            display: inline-block;
            width: 48%;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 60px;
            cursor: pointer;
            margin: 10px 0;
        }
        .tab.active { background: #b87333; color: white; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🛍️ الرعدي أونلاين</h1>
        
        <div>
            <div class="tab active" onclick="showTab('login')">تسجيل دخول</div>
            <div class="tab" onclick="showTab('register')">حساب جديد</div>
        </div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- تسجيل الدخول -->
        <div id="loginDiv">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="admin@system.com">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" value="admin123">
            <button onclick="login()">دخول</button>
        </div>
        
        <!-- تسجيل حساب جديد -->
        <div id="registerDiv" style="display:none;">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="tel" id="regPhone" placeholder="رقم الهاتف">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور">
            <button onclick="register()">إنشاء حساب</button>
        </div>
        
        <hr>
        <p style="font-size: 0.7rem; color: #666;">👑 المدير: admin@system.com / admin123</p>
    </div>

    <script>
        function showTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginDiv').style.display = 'block';
                document.getElementById('registerDiv').style.display = 'none';
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.querySelectorAll('.tab')[1].classList.remove('active');
            } else {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('registerDiv').style.display = 'block';
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.querySelectorAll('.tab')[0].classList.remove('active');
            }
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorDiv.innerHTML = '❌ ' + data.error;
                    errorDiv.style.display = 'block';
                }
            } catch(err) {
                errorDiv.innerHTML = '❌ خطأ في الاتصال بالخادم';
                errorDiv.style.display = 'block';
            }
        }
        
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            
            if (!name || !email || !password) {
                errorDiv.innerHTML = '❌ جميع الحقول مطلوبة';
                errorDiv.style.display = 'block';
                return;
            }
            if (password !== confirm) {
                errorDiv.innerHTML = '❌ كلمة المرور غير متطابقة';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ تم إنشاء الحساب بنجاح، يمكنك تسجيل الدخول الآن');
                    showTab('login');
                    document.getElementById('loginEmail').value = email;
                } else {
                    errorDiv.innerHTML = '❌ ' + data.error;
                    errorDiv.style.display = 'block';
                }
            } catch(err) {
                errorDiv.innerHTML = '❌ خطأ في الاتصال';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
