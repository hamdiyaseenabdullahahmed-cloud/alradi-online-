<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرعدي أونلاين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui;
        }
        body {
            background: linear-gradient(135deg, #0f1724, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 48px;
            padding: 45px 35px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        h1 {
            color: #b87333;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .btn {
            display: block;
            background: #b87333;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 12px 0;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #8b5a2b;
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #b87333;
            color: #b87333;
        }
        .btn-outline:hover {
            background: #b87333;
            color: white;
        }
        .demo-box {
            background: #f1f5f9;
            padding: 18px;
            border-radius: 28px;
            margin-top: 30px;
            font-size: 0.75rem;
            text-align: right;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        .status {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="logo">🛍️</div>
        <h1>الرعدي أونلاين</h1>
        <p class="subtitle">متجر المستقبل - تجربة تسوق فاخرة</p>
        
        <a href="/client.html" class="btn">👤 دخول العميل</a>
        <a href="/admin.html" class="btn btn-outline">🔐 لوحة المدير</a>
        
        <hr>
        
        <div class="demo-box">
            <strong>📋 بيانات الدخول التجريبية:</strong><br>
            👑 <strong>مدير:</strong> admin@system.com / admin123<br>
            👤 <strong>عميل:</strong> ahmed@client.com / 123456
        </div>
        
        <div class="status">
            ✅ النظام يعمل | 🚀 متصل بالخادم
        </div>
    </div>
</body>
</html>
